<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agt Agent</title>
<style>
  :root { --bg:#f5f6f8; --me:#2563eb; --bot:#ffffff; --line:#e2e5ea; --muted:#8a9099; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
         background:var(--bg); display:flex; flex-direction:column; color:#1f2329; }
  header { padding:10px 16px; background:#1f2329; color:#fff; display:flex; align-items:center; gap:10px; }
  header .dot { width:9px;height:9px;border-radius:50%;background:#22c55e; }
  header .dot.off { background:#ef4444; }
  header h1 { font-size:15px; margin:0; font-weight:600; }
  header .sub { font-size:12px; color:#9aa0a6; margin-left:auto; }
  /* 自主模式状态指示器 */
  .auto-badge { background:#7c3aed; color:#fff; padding:2px 8px; border-radius:10px; font-size:11px; margin-left:8px; }
  .auto-badge.hidden { display:none; }
  #msgArea { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
  .row { display:flex; }
  .row.me { justify-content:flex-end; }
  .bubble { max-width:78%; padding:9px 13px; border-radius:13px; line-height:1.55; font-size:14px;
            white-space:pre-wrap; word-break:break-word; box-shadow:0 1px 2px rgba(0,0,0,.05); }
  .row.me .bubble { background:var(--me); color:#fff; border-bottom-right-radius:4px; }
  .row.bot .bubble { background:var(--bot); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .row.sys .bubble { background:#eef2ff; border:1px solid #c7d2fe; color:#3730a3; font-size:12.5px; max-width:92%; white-space:pre-wrap; }
  .row.err .bubble { background:#fef2f2; border:1px solid #fecaca; color:#b91c1c; }
  .gal { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  .gal img { width:120px; height:120px; object-fit:cover; border-radius:8px; border:1px solid rgba(255,255,255,.3); }
  .row.me .gal img { border-color:rgba(255,255,255,.4); }
  details.trace { background:#fff; border:1px solid var(--line); border-radius:10px; padding:5px 10px; font-size:12.5px; color:#4b5158; max-width:78%; }
  details.trace > summary { cursor:pointer; color:var(--muted); user-select:none; }
  .ev { white-space:pre-wrap; word-break:break-word; margin:3px 0; line-height:1.5; }
  .ev.think { color:#9aa0a6; font-style:italic; }
  .ev.tool { color:#1f6feb; }
  .ev.res { color:#5b6470; padding-left:14px; border-left:2px solid var(--line); margin-left:2px; }
  .ev.step { color:var(--muted); font-size:11.5px; margin-top:6px; }
  .ev.warn { color:#b45309; }
  .ev.auto { color:#7c3aed; font-weight:600; }
  /* 控件栏 */
  #controls { display:flex; gap:8px; padding:8px 12px; background:#fff; border-top:1px solid var(--line); flex-wrap:wrap; align-items:center; }
  #modelSel { padding:5px 8px; border:1px solid var(--line); border-radius:8px; font-size:13px; background:#fff; max-width:240px; }
  .btn { padding:5px 10px; border:1px solid var(--line); background:#fff; border-radius:8px; font-size:12.5px; cursor:pointer; color:#374151; }
  .btn:hover { background:#f3f4f6; }
  .btn.primary { background:var(--me); color:#fff; border-color:var(--me); }
  .btn.auto { background:#7c3aed; color:#fff; border-color:#7c3aed; }
  .btn.spacer { margin-left:auto; }
  /* 附件 */
  #attBar { display:none; gap:8px; padding:6px 12px 0; background:#fff; flex-wrap:wrap; }
  .thumb { position:relative; }
  .thumb img { width:64px; height:64px; object-fit:cover; border-radius:6px; border:1px solid var(--line); }
  .thumb .rm { position:absolute; top:-6px; right:-6px; background:#ef4444; color:#fff; width:18px; height:18px;
               border-radius:50%; font-size:12px; line-height:18px; text-align:center; cursor:pointer; }
  #inputBar { display:flex; gap:10px; padding:10px 12px; background:#fff; border-top:1px solid var(--line); }
  #inp { flex:1; resize:none; height:46px; max-height:140px; padding:9px 12px; border:1px solid var(--line); border-radius:10px;
         font-size:14px; font-family:inherit; outline:none; }
  #inp:focus { border-color:var(--me); }
  #sendBtn { padding:0 18px; border:none; background:var(--me); color:#fff; border-radius:10px; font-size:14px; cursor:pointer; }
  #sendBtn:disabled { background:#9aa0a6; cursor:not-allowed; }
  /* 自主模式下发送按钮样式 */
  #sendBtn.auto-active { background:#7c3aed; }
  .restore-btn { display:block; margin-bottom:6px; font-size:11px; padding:3px 8px; border-radius:6px;
    border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.15); color:#fff; cursor:pointer; }
  .restore-btn:hover { background:rgba(255,255,255,.3); }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:none; align-items:center; justify-content:center; z-index:100; }
  .modal { background:#fff; padding:18px 20px; border-radius:12px; min-width:320px; display:flex; flex-direction:column; gap:10px; box-shadow:0 8px 30px rgba(0,0,0,.2); }
  .modal h3 { margin:0 0 4px; font-size:15px; }
  .modal label { display:flex; justify-content:space-between; align-items:center; font-size:13px; gap:10px; }
  .modal input[type=number]{ width:130px; padding:4px 6px; border:1px solid var(--line); border-radius:6px; font-size:13px; }
  .modal-btns { display:flex; gap:8px; justify-content:flex-end; margin-top:6px; }
  .plan-panel { background:#fff; border-bottom:1px solid var(--line); padding:6px 14px; font-size:13px; max-height:200px; overflow-y:auto; }
  .plan-panel summary { cursor:pointer; font-weight:600; color:#374151; }
  .plan-item { display:flex; gap:6px; align-items:center; padding:2px 0; }
  .plan-item .pi { width:20px; text-align:center; }
  /* 队列消息提示 */
  #queueStatus { font-size:12px; color:#7c3aed; padding:4px 12px; background:#f3e8ff; display:none; }
  #queueStatus.show { display:block; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1>Agt Agent</h1>
    <span class="sub" id="status">连接中…</span>
    <span class="auto-badge hidden" id="autoBadge">🔁 自主模式</span>
  </header>

  <div id="planPanel" class="plan-panel" style="display:none"><details open><summary>📋 计划清单</summary><div id="planList"></div></details></div>
  <div id="queueStatus">📨 已有 <span id="queueCount">0</span> 条消息在队列中，将在当前任务完成后处理</div>

  <div id="wfPanel" class="plan-panel" style="display:none"><details open>
    <summary>🧩 工作流（点 <b>Coze</b> 在编辑器打开 · <a href="#" id="wfReload">🔄 重载</a>）</summary>
    <div id="wfList"></div>
  </details></div>

  <div id="msgArea"></div>

  <div id="attBar"></div>

  <div id="controls">
    <select id="modelSel" title="切换模型"></select>
    <button class="btn" id="btnImg">📁 加图</button>
    <button class="btn" id="btnWf" title="工作流：查看/重载/在 Coze 中编辑">🧩 工作流</button>
    <button class="btn" id="btnEditor" onclick="window.open('/editor','_blank')" title="可视化工作流编辑器">✏ 编辑器</button>
    <select id="sessionSel" title="会话"><option value="__new__">➕ 新会话</option></select>
    <button class="btn auto" id="btnAuto" title="开启/关闭纯自主模式">🔁 自主</button>
    <button class="btn spacer" id="btnStop" style="display:none">⏹ 停止</button>
    <button class="btn" id="btnSettings">⚙ 设置</button>
    <button class="btn spacer" id="btnClear">🚮 清空</button>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none" />
  </div>

  <div id="inputBar">
    <textarea id="inp" placeholder="输入消息（Enter 发送 / Shift+Enter 换行）；可粘贴或上传图片"></textarea>
    <button id="sendBtn">发送</button>
  </div>

<div id="settingsModal" class="modal-overlay">
  <div class="modal" style="max-width:700px;width:90%">
    <h3>⚙ 设置</h3>
    <div style="display:flex;gap:16px">
    <div style="flex:1;min-width:0">
    <h4>模型管理</h4>
    <div id="modelList" style="max-height:300px;overflow-y:auto;margin:4px 0"></div>
    <button onclick="addModel()" style="font-size:12px">+ 添加模型</button>
    <button onclick="saveModels()" style="font-size:12px">💾 保存模型配置</button>
    <div style="font-size:10px;color:#8a9099;margin-top:4px">保存到 ~/.agt/models.json</div>
    </div>
    <div style="flex:1;min-width:0">
    <h4>运行时</h4>
    <label>max_steps <input id="cfg_max_steps" type="number"></label>
    <label>token_budget <input id="cfg_token_budget" type="number"></label>
    <label>max_retries <input id="cfg_max_retries" type="number"></label>
    <label>temperature <input id="cfg_temperature" type="number" step="0.1"></label>
    <label>回退链 <input id="cfg_fallback_chain" type="text" placeholder="glm,deepseek,qwen"></label>
    <label><input id="cfg_enable_thinking" type="checkbox"> enable_thinking</label>
    </div>
    </div>
    <div class="modal-btns">
      <button class="btn" id="cfgCancel">取消</button>
      <button class="btn primary" id="cfgSave">保存运行时</button>
    </div>
  </div>
</div>

<script>
const ws = new WebSocket(`ws://${location.host}/ws`);
const msgArea = document.getElementById('msgArea');
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const dot = document.getElementById('dot');
const modelSel = document.getElementById('modelSel');
const attBar = document.getElementById('attBar');
const fileInput = document.getElementById('fileInput');
const settingsModal = document.getElementById('settingsModal');
const autoBadge = document.getElementById('autoBadge');
const queueStatus = document.getElementById('queueStatus');
const queueCount = document.getElementById('queueCount');

let busy = false;
let autonomousMode = false;
let curTurn = null;
const attachments = []; // data URL 数组
let lastUserBubble = null;      // 最近一条用户气泡（挂检查点按钮用）
let restoreTargetBubble = null; // 回溯目标气泡
let messageQueueSize = 0;

function scrollBottom(){ msgArea.scrollTop = msgArea.scrollHeight; }
function setBusy(b){
  busy = b;
  // 自主模式下即使 busy 也可以发送
  sendBtn.disabled = b && !autonomousMode;
  sendBtn.classList.toggle('auto-active', autonomousMode && b);
  document.getElementById('btnStop').style.display = b ? 'inline-block' : 'none';
  if(!b) inp.focus();
}
function setOnline(on){ dot.classList.toggle('off', !on); statusEl.textContent = on ? '已连接' : '已断开'; }
function setAutonomousMode(on){
  autonomousMode = on;
  autoBadge.classList.toggle('hidden', !on);
  // 更新输入框提示
  if(on){
    inp.placeholder = "自主模式进行中… 输入消息将在当前任务完成后插入（Enter 发送）";
  } else {
    inp.placeholder = "输入消息（Enter 发送 / Shift+Enter 换行）；可粘贴或上传图片";
  }
}
function updateQueueStatus(size){
  messageQueueSize = size;
  queueCount.textContent = size;
  queueStatus.classList.toggle('show', size > 0);
}

function addRow(cls, text){
  const row=document.createElement('div'); row.className='row '+cls;
  const b=document.createElement('div'); b.className='bubble'; b.textContent=text;
  row.appendChild(b); msgArea.appendChild(row); scrollBottom(); return row;
}

function newTurn(){
  const wrap=document.createElement('div'); wrap.className='row bot';
  const col=document.createElement('div'); col.className='turn';
  const det=document.createElement('details'); det.className='trace'; det.open=true;
  const sum=document.createElement('summary'); sum.textContent='过程'; det.appendChild(sum);
  const box=document.createElement('div'); det.appendChild(box);
  const ans=document.createElement('div'); ans.className='bubble';
  col.appendChild(det); col.appendChild(ans); wrap.appendChild(col);
  msgArea.appendChild(wrap);
  curTurn={traceBox:box, answerEl:ans, det};
  scrollBottom();
}
function addTrace(cls, text){
  if(!curTurn) newTurn();
  const e=document.createElement('div'); e.className='ev '+cls; e.textContent=text;
  curTurn.traceBox.appendChild(e); scrollBottom();
}
function finishAnswer(text){
  if(!curTurn) newTurn();
  curTurn.answerEl.textContent=text;
  if(curTurn.det) curTurn.det.open=false;
  scrollBottom();
}

// —— 图片附件 ——
function renderThumbs(){
  attBar.innerHTML='';
  attachments.forEach((src,i)=>{
    const d=document.createElement('div'); d.className='thumb';
    const img=document.createElement('img'); img.src=src;
    const x=document.createElement('span'); x.textContent='×'; x.className='rm';
    x.onclick=()=>{ attachments.splice(i,1); renderThumbs(); };
    d.appendChild(img); d.appendChild(x); attBar.appendChild(d);
  });
  attBar.style.display = attachments.length?'flex':'none';
}
function addImageFile(file){
  const r=new FileReader();
  r.onload=()=>{ attachments.push(r.result); renderThumbs(); };
  r.readAsDataURL(file);
}
document.addEventListener('paste', e=>{
  const items = e.clipboardData?.items || [];
  for(const it of items){ if(it.type.startsWith('image/')){ const f=it.getAsFile(); if(f) addImageFile(f); } }
});
fileInput.addEventListener('change', e=>{
  for(const f of e.target.files) addImageFile(f);
  e.target.value='';
});

// —— 发送 ——
function sendRaw(text, images){
  ws.send(JSON.stringify({text, images: images||[]}));
}
function sendInsertMessage(text, imgs){
  // 自主模式下插入消息（即使 busy；当前不带图片，预留 imgs）
  ws.send(JSON.stringify({action:'insert_message', text}));
}
function addUserBubble(text, imgs){
  const row=document.createElement('div'); row.className='row me';
  const b=document.createElement('div'); b.className='bubble';
  if(text){ const t=document.createElement('div'); t.textContent=text; b.appendChild(t); }
  if(imgs && imgs.length){
    const gal=document.createElement('div'); gal.className='gal';
    imgs.forEach(s=>{ const im=document.createElement('img'); im.src=s; gal.appendChild(im); });
    b.appendChild(gal);
  }
  row.appendChild(b); msgArea.appendChild(row); scrollBottom();
  return row;
}
function send(){
  const t=inp.value.trim();
  if(!t && !attachments.length) return;
  // 自主模式且 busy 时，插入消息到队列
  if(busy && autonomousMode){
    const imgs=attachments.slice();
    sendInsertMessage(t, imgs);
    lastUserBubble = addUserBubble(t, imgs);
    inp.value=''; inp.style.height='auto';
    attachments.length=0; renderThumbs();
    return;
  }
  // 普通模式或自主模式但不 busy 时，正常发送
  if(busy) return;
  const imgs=attachments.slice();
  sendRaw(t, imgs);
  lastUserBubble = addUserBubble(t, imgs);
  inp.value=''; inp.style.height='auto';
  attachments.length=0; renderThumbs();
  if(!t.startsWith('/')){ setBusy(true); curTurn=null; }  // 斜杠命令不走 _done 流
}

// —— 按钮 ——
sendBtn.onclick=send;
document.getElementById('btnImg').onclick=()=>fileInput.click();
document.getElementById('btnClear').onclick=()=>{ msgArea.innerHTML=''; curTurn=null; };
document.getElementById('btnStop').onclick=()=>{ ws.send(JSON.stringify({action:'stop'})); };
document.getElementById('sessionSel').addEventListener('change',e=>{
  const v=e.target.value; e.target.value='';
  if(v==='__new__') ws.send(JSON.stringify({action:'new_session'}));
  else sendRaw('/resume '+v, []);
});
document.getElementById('btnAuto').onclick=()=>{
  // 切换自主模式：发送命令
  sendRaw('/autonomous', []);
};
document.getElementById('btnSettings').onclick=()=>{ settingsModal.style.display='flex'; ws.send(JSON.stringify({action:'get_config'})); loadModelList(); };
document.getElementById('cfgCancel').onclick=()=>{ settingsModal.style.display='none'; };
let _modelData={};

async function loadModelList(){
  try{const r=await fetch('/api/models');_modelData=await r.json();renderModelList();}catch(e){}
}
function renderModelList(){
  const box=document.getElementById('modelList');
  const models=_modelData.models||{};
  const def=_modelData.default||'';
  box.innerHTML=Object.entries(models).map(([name,m])=>`<div style="margin:2px 0;padding:4px;background:#0f3460;border-radius:4px;font-size:11px">
    <b>${name}</b> <input value="${m.model||''}" placeholder="model id" onchange="_modelData.models['${name}'].model=this.value" style="width:140px">
    <input value="${m.base_url||''}" placeholder="base_url" onchange="_modelData.models['${name}'].base_url=this.value" style="width:180px"><br>
    <input value="${m.api_token||''}" placeholder="api_token" type="password" onchange="_modelData.models['${name}'].api_token=this.value" style="width:330px">
    <button class="del" onclick="delete _modelData.models['${name}'];renderModelList()">×</button>
    ${name===def?'<span style="color:#98c379">✓默认</span>':`<button onclick="_modelData.default='${name}';renderModelList()">设默认</button>`}
  </div>`).join('')||'<div style="color:#8a9099">暂无模型</div>';
}
function addModel(){
  const name=prompt('模型名（如 glm, qwen, deepseek）：');if(!name)return;
  _modelData.models=_modelData.models||{};
  _modelData.models[name]={base_url:'https://api.openai.com/v1',api_token:'',model:'gpt-4',desc:'',thinking:false};
  if(!_modelData.default)_modelData.default=name;
  renderModelList();
}
async function saveModels(){
  try{
    const r=await fetch('/api/models',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(_modelData)});
    const d=await r.json();
    if(d.error){alert(d.error);}else{settingsModal.style.display='none';toast('✅ 模型已保存');}
  }catch(e){alert(e);}
}
function toast(m){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#533483;color:#fff;padding:8px 20px;border-radius:6px;z-index:999;transition:opacity .3s';document.body.appendChild(t);}t.textContent=m;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2000);}
document.getElementById('cfgSave').onclick=()=>{
  const values={
    max_steps: parseInt(document.getElementById('cfg_max_steps').value),
    token_budget: parseInt(document.getElementById('cfg_token_budget').value),
    max_retries: parseInt(document.getElementById('cfg_max_retries').value),
    temperature: parseFloat(document.getElementById('cfg_temperature').value),
    enable_thinking: document.getElementById('cfg_enable_thinking').checked,
    fallback_chain: document.getElementById('cfg_fallback_chain').value,
  };
  ws.send(JSON.stringify({action:'set_config', values}));
  settingsModal.style.display='none';
};
modelSel.addEventListener('change', ()=>sendRaw('/model '+modelSel.value, []));
inp.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });
inp.addEventListener('input', ()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,140)+'px'; });

function attachRestoreButton(bubble, sha){
  if(!bubble || bubble.querySelector('.restore-btn')) return;
  const btn=document.createElement('button');
  btn.className='restore-btn'; btn.textContent='↩ 回溯到这里之前';
  btn.title='丢弃这条及之后的改动与对话，工作区回滚到本条之前';
  btn.onclick=()=>{
    if(!confirm('回溯到这里之前？这条及之后的【文件改动】与【对话】都会被丢弃。')) return;
    restoreTargetBubble=bubble;
    ws.send(JSON.stringify({action:'restore', sha}));
  };
  bubble.insertBefore(btn, bubble.firstChild);
}

function renderPlan(plan){
  const panel=document.getElementById('planPanel');
  const list=document.getElementById('planList');
  list.innerHTML='';
  if(!plan || !plan.length){ panel.style.display='none'; return; }
  panel.style.display='block';
  const icon={'pending':'☐','in_progress':'▶','completed':'✅'};
  plan.forEach((s,i)=>{
    const row=document.createElement('div'); row.className='plan-item';
    const ic=document.createElement('span'); ic.className='pi'; ic.textContent=icon[s.status]||'?';
    const tx=document.createElement('span'); tx.textContent=(i+1)+'. '+s.description;
    if(s.status==='completed'){ tx.style.textDecoration='line-through'; tx.style.color='#8a9099'; }
    if(s.status==='in_progress'){ tx.style.fontWeight='600'; }
    row.appendChild(ic); row.appendChild(tx); list.appendChild(row);
  });
}

// —— WS 事件 ——
ws.onopen=()=>setOnline(true);
ws.onclose=()=>{ setOnline(false); inp.placeholder='连接已断开，请刷新页面'; };
ws.onerror=()=>setOnline(false);
ws.onmessage=(ev)=>{
  let m; try{m=JSON.parse(ev.data);}catch{m={type:'error',text:'解析事件失败'};}
  switch(m.type){
    case 'system':
      if(m.models){
        modelSel.innerHTML='';
        m.models.forEach(md=>{
          const o=document.createElement('option'); o.value=md.name;
          o.textContent=md.name + (md.desc?(' — '+md.desc):'');
          if(md.name===m.current_model) o.selected=true;
          modelSel.appendChild(o);
        });
        ws.send(JSON.stringify({action:'list_sessions'}));
      }
      addRow('sys', m.text); scrollBottom(); break;
    case 'checkpoint':
      if(lastUserBubble) attachRestoreButton(lastUserBubble, m.sha);
      break;
    case 'restored':
      if(restoreTargetBubble){
        const kids=[...msgArea.children];
        const idx=kids.indexOf(restoreTargetBubble);
        if(idx>=0) kids.slice(idx).forEach(k=>k.remove());
        restoreTargetBubble=null; curTurn=null; setBusy(false);
      }
      addRow('sys', '✅ 已回溯：工作区文件与对话已恢复到该指令之前。');
      break;
    case 'config':
      if(m.values){
        document.getElementById('cfg_max_steps').value = m.values.max_steps;
        document.getElementById('cfg_token_budget').value = m.values.token_budget;
        document.getElementById('cfg_max_retries').value = m.values.max_retries;
        document.getElementById('cfg_temperature').value = m.values.temperature;
        document.getElementById('cfg_enable_thinking').checked = !!m.values.enable_thinking;
        document.getElementById('cfg_fallback_chain').value = m.values.fallback_chain || '';
      }
      break;
    case 'saved':
      ws.send(JSON.stringify({action:'list_sessions'}));
      if(m.name) window._lastSaved=m.name;
      break;
    case 'plan':
      renderPlan(m.plan);
      break;
    case 'sessions':
      if(m.names){
        const sel=document.getElementById('sessionSel');
        const curVal=sel.value;
        sel.innerHTML='<option value="__new__">➕ 新会话</option>';
        m.names.forEach(n=>{ const o=document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o); });
        if(window._lastSaved && sel.querySelector(`option[value="${window._lastSaved}"]`)) sel.value=window._lastSaved;
        else if(curVal && curVal!=='__new__' && sel.querySelector(`option[value="${curVal}"]`)) sel.value=curVal;
        window._lastSaved=null;
      }
      break;
    case 'error': addRow('err', m.text); setBusy(false); break;
    case 'step': addTrace('step', `— 第 ${m.n} 步 · 累计 ${m.tokens} token${m.model?` · by ${m.model}`:''} —`); break;
    case 'thinking': addTrace('think', '💭 '+m.text); break;
    case 'parallel': addTrace('tool', `⚡ 并行 ${m.count} 个工具`); break;
    case 'tool_call': addTrace('tool', `🔧 ${m.name}(${fmtArgs(m.arguments)})`); break;
    case 'tool_stream':
      // 流式输出：追加到当前 trace 的最后一个 stream 行，或新建
      if(!curTurn) newTurn();
      const last = curTurn.traceBox.lastElementChild;
      if(last && last.classList.contains('ev') && last.dataset.stream){
        last.textContent += m.text; scrollBottom();
      } else {
        const e=document.createElement('div'); e.className='ev res'; e.dataset.stream='1'; e.textContent=m.text; curTurn.traceBox.appendChild(e); scrollBottom();
      }
      break;
    case 'tool_progress':
      addTrace('warn', `⏳ ${m.name} 运行中 ${m.elapsed}s，${m.lines||0} 行输出`);
      break;
    case 'tool_result': addTrace('res', `→ ${m.result}`); break;
    case 'warn': addTrace('warn', '⚠️ '+m.text); break;
    case 'answer': case 'wrap_answer': finishAnswer(m.text); break;
    case 'wrap_up': addTrace('warn', '⚠️ 触达上限，强制收尾'); break;
    case 'budget_hit': addTrace('warn', '⚠️ 预算用尽'); break;
    case 'interrupted': addRow('sys','⏹ 已中断'); setBusy(false); break;
    case 'autonomous_status':
      setAutonomousMode(!!m.active);
      if(m.active){
        addRow('sys', `🔁 纯自主模式已开启，持续到 ${new Date(m.end_time).toLocaleString()}`);
      } else {
        addRow('sys', '🔁 纯自主模式已关闭');
      }
      break;
    case 'autonomous_continue':
      addTrace('auto', `🔁 自主继续：${m.text}`);
      break;
    case 'autonomous_next':
      addTrace('auto', `🔁 准备下一轮：${m.text}`);
      break;
    case 'message_queued':
      updateQueueStatus(m.queue_size);
      addRow('sys', `📨 消息已入队（当前队列：${m.queue_size} 条）`);
      break;
    case 'message_injected':
      addRow('sys', `📨 用户消息已注入 Agent 上下文：${m.text}`);
      updateQueueStatus(0);
      break;
    case 'workflows':
      renderWorkflows(m.items||[]);
      break;
    case 'coze_url':
      if(m.url){ window.open(m.url, '_blank'); }
      else addRow('sys', '⚠️ 该工作流未配置 coze_url');
      break;
    case 'auto_wf':
      addTrace('auto', '🔍 自动工作流['+m.name+']: '+m.text);
      break;
    case 'workflow_message':
      addRow('sys', '💬 '+m.text);
      break;
    case '_ping':
      break;  // 心跳，不渲染
    case '_done':
      if(curTurn && !curTurn.answerEl.textContent){
        curTurn.answerEl.textContent='（本轮无最终回答）'; curTurn.answerEl.style.color='#8a9099';
      }
      if(curTurn && curTurn.det) curTurn.det.open=false;
      // 自主模式下不解除 busy 状态（会继续下一轮）
      if(!autonomousMode) setBusy(false);
      break;
  }
};
function fmtArgs(a){ if(a==null) return ''; try{ return typeof a==='object'?JSON.stringify(a):String(a); }catch{ return String(a); } }

function renderWorkflows(items){
  const box=document.getElementById('wfList');
  if(!items.length){ box.innerHTML='<div class="ev" style="color:#8a9099">（无工作流。把 Coze 画布 .json + .json.meta 放进 .agent/workflows/）</div>'; return; }
  const mark={ok:'✅',warn:'⚠️',error:'❌',disabled:'⏸'};
  box.innerHTML=items.map(it=>{
    const desc=it.description?` <span style="color:#8a9099">${it.description}</span>`:'';
    const detail=it.detail?` <span style="color:#e6a23c">— ${it.detail}</span>`:'';
    return `<div class="ev">${mark[it.status]||'•'} <b>${it.tool}</b>${desc}${detail}`+
           ` <a href="#" data-wf="${it.name}" class="wfCoze" style="margin-left:8px">Coze ↗</a></div>`;
  }).join('');
  box.querySelectorAll('.wfCoze').forEach(a=>a.onclick=(e)=>{ e.preventDefault(); e.stopPropagation();
    ws.send(JSON.stringify({action:'open_coze', name:a.dataset.wf})); });
}
document.getElementById('btnWf').onclick=()=>{
  const p=document.getElementById('wfPanel');
  p.style.display = p.style.display==='none' ? 'block' : 'none';
  ws.send(JSON.stringify({action:'list_workflows'}));
};
document.getElementById('wfReload').onclick=(e)=>{ e.preventDefault(); e.stopPropagation(); ws.send(JSON.stringify({action:'reload_workflows'})); };

inp.focus();
</script>
