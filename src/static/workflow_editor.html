<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>工作流编辑器 — Agt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:13px/1.5 system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-wrap:wrap}
#topbar select,#topbar input,#topbar button{background:#0f3460;color:#e0e0e0;border:1px solid #533483;border-radius:4px;padding:4px 8px;font-size:12px}
#topbar button{cursor:pointer;background:#533483;border-color:#7b2ff7}
#topbar button:hover{background:#7b2ff7}
#topbar button.danger{background:#6b2020;border-color:#a33}
#topbar button.danger:hover{background:#a33}
#main{display:flex;flex:1;overflow:hidden}
/* 左：调色板 */
#palette{width:170px;background:#16213e;border-right:1px solid #0f3460;padding:6px;overflow-y:auto}
#palette h3{font-size:11px;color:#8a9099;margin:6px 0 3px;text-transform:uppercase}
.pal-item{display:block;width:100%;text-align:left;padding:5px 7px;margin:2px 0;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:#fff}
.pal-item.flow{background:#1a5c2a}.pal-item.llm{background:#1a3a6b}.pal-item.code{background:#3a1a6b}
.pal-item.branch{background:#6b3a1a}.pal-item.composite{background:#1a6b6b}
.pal-item.data{background:#4a4a1a}.pal-item.ext{background:#4a1a4a}
/* 中：画布 */
#canvasWrap{flex:1;background:#1a1a2e;overflow:auto;position:relative;cursor:grab}
#canvasWrap:active{cursor:grabbing}
#svgCanvas{width:3000px;height:2200px;display:block}
.grid-line{stroke:#ffffff08}
.node-body{fill:#16213e;stroke:#533483;stroke-width:1.5}
.node-body.sel{stroke:#7b2ff7;stroke-width:2.5;filter:drop-shadow(0 0 6px #7b2ff755)}
.node-header-rect{rx:4}
.node-title{fill:#fff;font-size:12px;font-weight:600;pointer-events:none}
.node-type-tag{fill:#8a9099;font-size:9px;pointer-events:none}
.node-field-name{font-size:10px;dominant-baseline:middle;pointer-events:none}
.expand-toggle{font-size:11px;cursor:pointer;user-select:none;dominant-baseline:middle}
.sub-row{font-size:9px;dominant-baseline:middle;pointer-events:none}
/* 流程端口（标题栏左右） */
.port-flow{fill:#fff;stroke:#533483;stroke-width:1.5;cursor:crosshair}
.port-flow:hover{fill:#7b2ff7;stroke:#fff;r:7}
/* 变量端口 */
.port-var{stroke-width:1.5;cursor:crosshair}
.port-var:hover{stroke:#fff}
/* 流程线（白实线） */
.edge-flow{stroke:#fff;stroke-width:2;fill:none;marker-end:url(#arrowFlow)}
.edge-flow.sel{stroke:#7b2ff7;stroke-width:3}
/* 变量线（彩色虚线） */
.edge-var{stroke-width:1.8;fill:none;stroke-dasharray:6 4;marker-end:url(#arrowVar)}
.edge-var.sel{stroke-width:2.8}
.edge-ghost{stroke:#7b2ff7;stroke-width:1.5;stroke-dasharray:5 4;fill:none;pointer-events:none}
.edge-label{fill:#bbb;font-size:9px;pointer-events:none}
/* 右：属性浮框（选中节点时显示） */
#propsFloat{position:absolute;top:48px;right:10px;width:330px;max-height:calc(100vh - 60px);overflow-y:auto;background:#16213e;border:1px solid #533483;border-radius:6px;padding:10px;z-index:50;box-shadow:0 4px 20px #0008}
#propsFloat h3{font-size:12px;color:#8a9099;margin:10px 0 3px;border-bottom:1px solid #0f3460;padding-bottom:3px}
#propsFloat label{display:block;font-size:11px;color:#8a9099;margin-top:5px}
#propsFloat input,#propsFloat select,#propsFloat textarea{width:100%;background:#0f3460;color:#e0e0e0;border:1px solid #533483;border-radius:3px;padding:3px 5px;font-size:12px;margin-top:1px}
#propsFloat textarea{resize:vertical;font-family:monospace;min-height:50px}
#propsFloat button{background:#533483;color:#fff;border:none;border-radius:3px;padding:3px 7px;font-size:11px;cursor:pointer;margin:3px 2px}
#propsFloat button:hover{background:#7b2ff7}
#propsFloat button.del{background:#6b2020;padding:2px 6px}
#propsFloat button.del:hover{background:#a33}
/* 节点选择浮框（拖线到空白/双击空白弹出） */
#nodePicker{position:absolute;width:440px;max-height:560px;overflow-y:auto;background:#16213e;border:1px solid #7b2ff7;border-radius:6px;padding:8px;z-index:60;box-shadow:0 4px 24px #000c}
#nodePicker .np-filter{width:100%;margin-bottom:6px;font-size:11px;background:#0f3460;color:#fff;border:1px solid #533483;border-radius:3px;padding:4px}
#nodePicker .np-group{color:#7b2ff7;font-size:10px;font-weight:bold;margin:6px 0 3px;padding-bottom:1px;border-bottom:1px solid #2a2f3a}
#nodePicker .np-row{display:flex;flex-wrap:wrap;gap:4px}
#nodePicker .np-item{flex:1 1 calc(33.333% - 4px);min-width:0;text-align:center;padding:6px 4px;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:#fff;background:#0f3460;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#nodePicker .np-item:hover{background:#7b2ff7}
/* 图例浮标（画布右下角，半透明，hover 展开） */
#legendFloat{position:absolute;bottom:10px;right:10px;background:#16213eee;border:1px solid #0f3460;border-radius:5px;padding:5px 8px;font-size:9px;z-index:30;max-width:170px;opacity:.5;transition:opacity .2s;pointer-events:auto}
#legendFloat:hover{opacity:1}
.io-table{width:100%;border-collapse:collapse;font-size:11px;background:#131b35;border-radius:4px}
.io-table td{padding:1px;vertical-align:top}
.io-table input,.io-table select{width:100%;font-size:11px;padding:2px 3px;margin:0}
.io-fbg-even{background:#1c2548}
.io-fbg-odd{background:transparent}
.sub-fields{margin-left:10px;border-left:2px solid #0f3460;padding-left:6px;margin-top:2px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#533483;color:#fff;padding:8px 20px;border-radius:6px;z-index:999;transition:opacity .3s;pointer-events:none}
.legend{font-size:10px;color:#8a9099;line-height:1.7}
.swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}
</style>
</head>
<body>
<div id="topbar">
  <select id="fileSel"><option value="">选择工作流…</option></select>
  <button onclick="WE.createWf()">➕ 新建</button>
  <button onclick="WE.saveWf()">💾 保存</button>
  <select id="saveFormat" title="保存格式（XML：代码/提示词 CDATA 免转义，适合手写）"><option value="json">存为 JSON</option><option value="xml">存为 XML</option></select>
  <button class="danger" onclick="WE.deleteWf()">🗑 删除</button>
  <button onclick="focusEntry()" title="聚焦到开始节点">📍 聚焦</button>
  <button onclick="autoLayout()" title="按流程方向分层自动布局，孤立节点纵向罗列">📐 自动布局</button>
  <input id="fdesc" placeholder="描述" style="flex:1;min-width:120px">
  <input id="fcoze" placeholder="Coze URL（可选）" style="width:220px">
  <label style="font-size:11px;color:#8a9099"><input type="checkbox" id="fauto" onchange="WF.meta.auto=this.checked"> 自动</label>
  <input id="fautoparam" placeholder="自动参数名(默认query)" style="width:130px" onchange="WF.meta.auto_param=this.value">
  <span style="color:#8a9099;font-size:11px" id="fstatus"></span>
  <span id="breadcrumb" style="color:#7b2ff7;font-weight:600;font-size:12px;display:none"></span>
  <button id="btnExitComp" style="display:none" onclick="exitComposite()">◀ 退出子画布</button>
</div>
<div id="main">
  <div id="canvasWrap"><svg id="svgCanvas"></svg></div>
</div>
<!-- 属性浮框：选中节点时显示，点画布空白隐藏 -->
<div id="propsFloat" style="display:none"><div id="propsContent"></div></div>
<!-- 节点选择浮框：从节点拖流程线到空白 / 双击空白时在该位置弹出；拖线时选节点后自动连线 -->
<div id="nodePicker" style="display:none"></div>
<!-- 图例浮标（画布右下角） -->
<div id="legendFloat"></div>
<div id="toast" style="opacity:0"></div>

<script>
// ============ 常量 ============
const TYPE_LABEL={1:'Entry',2:'Exit',3:'LLM',5:'Code',8:'Selector',9:'SubWorkflow',4:'Plugin',13:'Output',15:'Text',19:'Break',20:'SetVar',21:'Loop',22:'Intent',28:'Batch',29:'Continue',32:'Aggregator',40:'Assigner',45:'HTTP',58:'ToJSON',59:'FromJSON'};
const TYPE_CATEGORY={1:'flow',2:'flow',3:'llm',5:'code',8:'branch',9:'ext',4:'ext',13:'ext',15:'data',21:'composite',22:'llm',28:'composite',32:'data',40:'data',45:'ext',58:'data',59:'data'};
const HDR_COLOR={flow:'#1a5c2a',llm:'#1a3a6b',code:'#3a1a6b',branch:'#6b3a1a',composite:'#1a6b6b',data:'#4a4a1a',ext:'#4a1a4a'};
const IO_TYPES=['string','integer','float','number','boolean','object','list','file','time'];
// 变量类型颜色
const TYPE_COLOR={string:'#e6c07b',integer:'#56b6c2',float:'#56b6c2',number:'#56b6c2',boolean:'#c678dd',object:'#61afef',list:'#98c379',file:'#e06c75',time:'#d19a66'};
const OPERATORS=[{v:1,t:'='},{v:2,t:'≠'},{v:7,t:'包含'},{v:8,t:'不含'},{v:9,t:'为空'},{v:10,t:'非空'},{v:13,t:'>'},{v:14,t:'≥'},{v:15,t:'<'},{v:16,t:'≤'}];

const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('svgCanvas');

let WF={name:'',nodes:[
  {id:'100001',type:'1',x:80,y:100,w:200,data:{nodeMeta:{title:'开始'},outputs:[],trigger_parameters:[]}},
  {id:'900001',type:'2',x:500,y:100,w:200,data:{nodeMeta:{title:'结束'},inputs:{terminatePlan:'returnVariables',inputParameters:[]}}}
],edges:[],meta:{name:'',description:'',enabled:true,coze_url:''}};
let selNode=null,selEdge=null;     // selEdge: {kind:'flow',i} 或 {kind:'var',tgtNode,tgtField}
let dragNode=null,dragDX=0,dragDY=0;
let edgeFrom=null;                 // {kind:'flow'|'var', nodeId, port, x, y, color}
let _suppressClick=false;          // 拖线弹窗后抑制一次 click（避免立即被“点空白”关闭）
let panning=false,panX=0,panY=0,panStartX=0,panStartY=0;
let dz=1;  // zoom level
let collapsedFields=new Set();     // 折叠的 object 字段（默认全部展开）
let _pendingHandles=[];            // 连线断开 handle（延后到节点之上绘制）
let _compositeStack=[];            // 子画布栈 [{parentId, name, nodes, edges}]
let _currentParent=null;           // 当前所在复合节点 id（null=顶层）

// ============ 工具 ============
function elm(tag,attrs={},text){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  if(text!=null)e.textContent=text;
  return e;
}
function ext(s,d=''){return s!=null?s:d;}
function genId(){return ''+(Date.now()%1000000+Math.floor(Math.random()*900000));}
function findN(id){return WF.nodes.find(n=>n.id===id);}
function nodeTitle(n){return n.data.nodeMeta?.title||TYPE_LABEL[n.type]||('节点'+n.type);}
function nodeInputs(n){return n.data.inputs?.inputParameters||[];}
function nodeOutputs(n){return n.data.outputs||[];}
// 输入字段是否已连变量线（ref 且 block-output）
function _effInput(p){
  // type20的输入是right, type40是input, 普通节点是input, left用于指向变量名
  return p.right||p.input||p.left||{};
}
function inputIsLinked(p){
  const eff=_effInput(p); const v=eff.value;
  return v&&v.type==='ref'&&v.content?.source==='block-output'&&v.content?.blockID;
}
function inputRefSource(p){const v=_effInput(p).value;return v?.content;}
// 类型颜色（list 取 item 颜色？统一用字段本身 type 颜色）
function fieldColor(type){return TYPE_COLOR[type]||'#aaa';}

// ============ 端口行布局（支持 object 字段展开）============
const HDR_H=26, ROW_H=18, PAD=8;

// 为节点计算"行"列表：每行 = 一个可连线端口。
// 输入在左侧、输出在右侧，共用行索引（各自独立计数）。
// 行: {side:'in'|'out', field:字段名(子字段用 父.子), type, parent:父字段名|null, sub:boolean}
function nodeRows(n){
  const rows=[];
  // 聚合节点用自定义渲染，跳过常规端口
  if(n.type==='32') return rows;
  const ins=nodeInputs(n), outs=nodeOutputs(n);
  for(let i=0;i<Math.max(ins.length,outs.length);i++){
    if(ins[i]) rows.push(...fieldRows(n.id, ins[i],'in'));
    if(outs[i]) rows.push(...fieldRows(n.id, outs[i],'out'));
  }
  return rows;
}
// 折叠 key 统一格式：nodeId::首段::side::后续段...（与 fieldRows 行 key 一致）
function _rowKey(nodeId,side,path){
  const segs=path.split('.');
  return nodeId+'::'+segs[0]+'::'+side+(segs.length>1?'::'+segs.slice(1).join('::'):'');
}
function fieldRows(nodeId, f, side){
  // type20/40 用 left 代替 input 作为类型来源
  const effInput=_effInput(f)||{};
  const type=side==='in'?(effInput.type||'string'):(f.type||'string');
  const name=f.name;
  const key=_rowKey(nodeId,side,name);
  const rows=[{side,field:name,type,parent:null,sub:false,key,depth:0}];
  if(type==='object' && !collapsedFields.has(key)){
    _pushSubRows(rows,nodeId,side,name,(f.schema||f.input?.schema),key,1);
  }
  return rows;
}
// 递归铺开 object 子字段行（任意深度；depth 用于缩进；list 不展开，整体连线）
function _pushSubRows(rows,nodeId,side,prefix,schema,parentKey,depth){
  (Array.isArray(schema)?schema:[]).forEach(s=>{
    const key=parentKey+'::'+s.name;
    const path=prefix+'.'+s.name;
    const st=s.type||'string';
    rows.push({side,field:path,type:st,parent:prefix,sub:true,key,depth});
    if(st==='object'&&!collapsedFields.has(key))_pushSubRows(rows,nodeId,side,path,s.schema,key,depth+1);
  });
}
function nodeH(n){
  const rows=nodeRows(n).filter(r=>
    (n.type==='1'?r.side==='out':n.type==='2'?r.side==='in':true));
  const inRows=rows.filter(r=>r.side==='in').length;
  const outRows=rows.filter(r=>r.side==='out').length;
  let h=HDR_H+Math.max(inRows,outRows)*ROW_H+PAD;
  if(n.type==='15') h+=TEXTAREA_H;   // 文本节点：大文本框
  if(n.type==='5') h+=40;            // 代码节点：预览行
  if(n.type==='8'){                  // 选择器：分支行高度
    const brs=(n.data.inputs?.branches||[]).length;
    h+=(brs+1)*22+8;
  }
  if(['21','28'].includes(n.type)) h+=36;  // 复合节点：编辑子画布按钮
  if(n.type==='22'){                 // 意图识别：分支出口行高度
    h+=((n.data.inputs?.intents||[]).length+1)*22+10;
  }
  return h;
}
const TEXTAREA_H=120;
// 聚合节点(type32) 分组布局：复刻 renderNode 的 y 公式（gy 动态累加，非 ROW_H 网格），
// 供 portY/变量线定位，保证端口与连线对齐。
function aggrLayout(n){
  const groups=n.data.inputs?.mergeGroups||[];
  const res=[]; let gy=HDR_H+8;
  groups.forEach(grp=>{
    const vars=grp.variables||[];
    res.push({gname:grp.name||'?', outY:gy+12, varsY:vars.map((v,i)=>gy+12+(i+1)*18)});
    gy+=28+Math.max((vars.length-1)*18,0)+10;
  });
  return res;
}
// 取某端口的 y（按它在所在侧的行序）
function portY(n, side, field){
  if(n.type==='32'){   // 聚合节点端口在分组行，不按 ROW_H 网格
    const L=aggrLayout(n);
    if(side==='out'){const g=L.find(x=>x.gname===field); return g? n.y+g.outY : n.y+HDR_H+ROW_H/2;}
    return n.y+HDR_H+ROW_H/2;
  }
  const rows=nodeRows(n).filter(r=>r.side===side);
  const i=rows.findIndex(r=>r.field===field);
  if(i<0) return n.y+HDR_H+ROW_H/2;
  return n.y+HDR_H+i*ROW_H+ROW_H/2;
}
function inPortPos(n,field){return{x:n.x, y:portY(n,'in',field)};}
function outPortPos(n,field){return{x:n.x+n.w, y:portY(n,'out',field)};}
// 流程端口（标题栏左右）
function flowOutPos(n){return{x:n.x+n.w, y:n.y+HDR_H/2};}
function flowInPos(n){return{x:n.x, y:n.y+HDR_H/2};}
function flowInPos(n){return{x:n.x, y:n.y+HDR_H/2};}

// 带 sourcePortID 的流程出口位置：selector(8)/intent(22) 的分支端口在节点右侧分行，
// 不在标题栏中点。复刻 renderSelectorBranches / 意图分支端口的 y 计算，保证连线起点对齐端口。
// fallbackIdx：当 portID 非标准（如模型手写的 'stats_phase'，执行器/本编辑器都不认）时，
// 按该边在源节点出边中的顺序兜底定位到对应分支端口，保证至少视觉对齐。
function flowOutPosFor(n, portID, fallbackIdx){
  if(!['8','22'].includes(n.type)) return flowOutPos(n);
  const baseY = HDR_H + Math.max(nodeInputs(n).length, nodeOutputs(n).length)*ROW_H;
  let idx=-1, total=0, yForIdx=null;
  if(n.type==='8'){
    const branches = n.data.inputs?.branches||[];
    const ports=[...branches.map((b,i)=>i===0?'true':`true_${i}`), 'false'];   // 与 renderSelectorBranches 一致
    total=ports.length;
    if(portID) idx=ports.indexOf(portID);
    yForIdx=(i)=>n.y + baseY + 4 + 10 + i*22;
  } else { // '22'
    const intents=n.data.inputs?.intents||[];
    const ports=[...intents.map((_,i)=>`branch_${i}`), 'default'];
    const startIy=baseY+8;
    total=ports.length;
    if(portID) idx=ports.indexOf(portID);
    yForIdx=(i)=>n.y + startIy + (i<intents.length? i*22 : intents.length*22);
  }
  if(idx<0) idx = (fallbackIdx!=null)? Math.min(fallbackIdx, total-1) : 0;   // 兜底
  if(idx<0||idx>=total) return flowOutPos(n);
  return {x:n.x+n.w, y:yForIdx(idx)};
}

// 插件节点(type4)：若 inputParameters/outputs 为空，按 AGENT_TOOLS 中该工具的 schema 补全。
// 解决模型只写 toolName 没写输入字段、或用 MCP 工具时编辑器显示空的问题。保留已有字段（含连线）。
function syncToolNode(n){
  if(n.type!=='4' || !n.data.toolName) return;
  const t=AGENT_TOOLS.find(x=>x.name===n.data.toolName);
  if(!t) return;
  n.data.inputs=n.data.inputs||{};
  const params=n.data.inputs.inputParameters||(n.data.inputs.inputParameters=[]);
  const existing=new Set(params.map(p=>p.name));
  t.params.forEach(p=>{
    if(!existing.has(p.name))
      params.push({name:p.name, input:{type:_mapToolType(p.type), value:{type:'literal',content:''}}});
  });
  if(!n.data.outputs || !n.data.outputs.length){
    n.data.outputs=(t.outputs||[{name:'raw',type:'string',description:'工具返回'}])
      .map(o=>({name:o.name,type:o.type||'string',description:o.description||''}));
  }
}

// ============ 渲染 ============
function renderAll(){
  svg.innerHTML='';
  svg.style.transform='scale('+dz+')';
  svg.style.transformOrigin='0 0';
  _pendingHandles=[];
  // defs（箭头）
  const defs=elm('defs');
  defs.innerHTML=`<marker id="arrowFlow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fff"/></marker>
    <marker id="arrowVar" markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="context-stroke"/></marker>`;
  svg.appendChild(defs);
  // 网格
  for(let x=0;x<3000;x+=40)svg.appendChild(elm('line',{x1:x,y1:0,x2:x,y2:2200,'class':'grid-line'}));
  for(let y=0;y<2200;y+=40)svg.appendChild(elm('line',{x1:0,y1:y,x2:3000,y2:y,'class':'grid-line'}));

  // ---- 变量线（先画，在节点下层）----
  WF.nodes.forEach(tn=>{
    nodeInputs(tn).forEach((p)=>{
      if(!inputIsLinked(p))return;
      const src=inputRefSource(p);
      const sn=findN(src.blockID); if(!sn)return;
      // 支持点号：src.name 可能是 "obj.field"
      const sp=outPortPos(sn, src.name.split('.')[0]===src.name?src.name:src.name);
      // 子字段引用：src.name="obj.f" 时，源端口画在 obj 展开后的 f 子行（若展开）或 obj 行
      const srcField = src.name;
      const tp=inPortPos(tn, p.name);
      const key=tn.id+'::'+p.name;
      const sel=selEdge&&selEdge.kind==='var'&&selEdge.key===key;
      const col=fieldColor(p.input?.type||'string');
      // 源端口位置：若 src.name 含点号且源节点展开了该 object，定位到子行；否则定位到父字段行
      let sx;
      if(src.name.includes('.')){
        const [parent,child]=src.name.split('.');
        const rows=nodeRows(sn).filter(r=>r.side==='out'&&r.field===src.name);
        sx = rows.length? {x:sn.x+sn.w, y:portY(sn,'out',src.name)} : outPortPos(sn,parent);
      }else{
        sx=outPortPos(sn,src.name);
      }
      const path=elm('path',{d:bezier(sx,tp,true),class:'edge-var'+(sel?' sel':''),stroke:col,'marker-end':'url(#arrowVar)','data-varkey':key});
      path.onclick=(e)=>{e.stopPropagation();selEdge={kind:'var',key};selNode=null;showProps();renderAll();};
      svg.appendChild(path);
      // 目标端断开 handle：延后到节点之上绘制（避免被节点遮挡）
      _pendingHandles.push({x:tp.x,y:tp.y,r:4,fill:col,stroke:'#fff',info:{kind:'var',key,tgtNode:tn.id,tgtField:p.name},sp:sx,color:col});
    });
  });
  // 聚合节点(type32)：mergeGroups 变量不在 inputParameters，单独画变量线
  WF.nodes.forEach(tn=>{
    if(tn.type!=='32')return;
    const L=aggrLayout(tn);
    (tn.data.inputs?.mergeGroups||[]).forEach((grp,gi)=>{
      (grp.variables||[]).forEach((v,vi)=>{
        const val=v.value; if(!val||val.type!=='ref')return;
        const ct=val.content||{}; if(ct.source!=='block-output'||!ct.blockID)return;
        const sn=findN(ct.blockID); if(!sn)return;
        const sx=outPortPos(sn, ct.name||'');
        const tp={x:tn.x+10, y:tn.y+L[gi].varsY[vi]};
        const key=tn.id+'::aggr::'+gi+'::'+vi;
        const col=fieldColor(v.type||'string');
        const sel=selEdge&&selEdge.kind==='var'&&selEdge.key===key;
        const path=elm('path',{d:bezier(sx,tp,true),class:'edge-var'+(sel?' sel':''),stroke:col,'marker-end':'url(#arrowVar)','data-varkey':key});
        path.onclick=(e)=>{e.stopPropagation();selEdge={kind:'var',key};selNode=null;showProps();renderAll();};
        svg.appendChild(path);
        _pendingHandles.push({x:tp.x,y:tp.y,r:4,fill:col,stroke:'#fff',info:{kind:'var',key,tgtNode:tn.id,tgtField:'__aggr__',aggrGi:gi,aggrVi:vi},sp:sx,color:col});
      });
    });
  });

  // ---- 流程线 ----
  WF.edges.forEach((ed,i)=>{
    const sn=findN(ed.sourceNodeID),tn=findN(ed.targetNodeID); if(!sn||!tn)return;
    let sp;
    if(['8','22'].includes(sn.type)){
      // 该边在源节点出边中的顺序（兜底定位非标准 portID 的分支线）
      const outEs=WF.edges.filter(e=>e.sourceNodeID===ed.sourceNodeID);
      const fIdx=outEs.findIndex(e=>e===ed);
      sp=flowOutPosFor(sn, ed.sourcePortID, fIdx);
    }else{
      sp=flowOutPos(sn);
    }
    const tp=flowInPos(tn);
    const sel=selEdge&&selEdge.kind==='flow'&&selEdge.i===i;
    const path=elm('path',{d:bezier(sp,tp,false),class:'edge-flow'+(sel?' sel':''),'data-flowi':i});
    path.onclick=(e)=>{e.stopPropagation();selEdge={kind:'flow',i};selNode=null;showProps();renderAll();};
    svg.appendChild(path);
    if(ed.sourcePortID){
      svg.appendChild(elm('text',{x:(sp.x+tp.x)/2,y:(sp.y+tp.y)/2-8,class:'edge-label','text-anchor':'middle'},ed.sourcePortID));
    }
    // 目标端断开 handle：延后绘制
    _pendingHandles.push({x:tp.x,y:tp.y,r:5,fill:'#fff',stroke:'#533483',info:{kind:'flow',i},sp:sp,color:'#fff'});
  });

  // ---- 节点 ----
  WF.nodes.forEach(n=>svg.appendChild(renderNode(n)));

  // ---- 连线断开 handle（最上层，避免被节点遮挡）----
  _pendingHandles.forEach(h=>{
    const handle=elm('circle',{cx:h.x,cy:h.y,r:h.r,fill:h.fill,stroke:h.stroke,'stroke-width':1.5,class:'edge-handle',style:'cursor:grab'});
    handle.onmousedown=(e)=>{e.stopPropagation();startDisconnect(h.info,h.sp,h.color);};
    svg.appendChild(handle);
  });

  // ---- 拖拽临时线 ----
  if(edgeFrom){
    const sx=edgeFrom.sp?edgeFrom.sp.x:edgeFrom.x, sy=edgeFrom.sp?edgeFrom.sp.y:edgeFrom.y;
    svg.appendChild(elm('path',{d:bezier({x:sx,y:sy},{x:edgeFrom.mx,y:edgeFrom.my},edgeFrom.kind!=='flow'),class:'edge-ghost',stroke:edgeFrom.color||'#7b2ff7'}));
  }
}

function bezier(sp,tp,isVar){
  const dx=Math.abs(tp.x-sp.x);
  const c1x=sp.x+dx*0.5, c2x=tp.x-dx*0.5;
  return `M${sp.x},${sp.y} C${c1x},${sp.y} ${c2x},${tp.y} ${tp.x},${tp.y}`;
}

function renderNode(n){
  const g=elm('g',{transform:`translate(${n.x},${n.y})`,'data-id':n.id});
  n.h=nodeH(n);
  const cat=TYPE_CATEGORY[n.type]||'llm';
  // 体
  g.appendChild(elm('rect',{x:0,y:0,width:n.w,height:n.h,class:'node-body'+(selNode===n.id?' sel':'')}));
  // 标题栏
  g.appendChild(elm('rect',{x:0,y:0,width:n.w,height:HDR_H,fill:HDR_COLOR[cat]||'#533483',rx:4,'class':'node-header-rect'}));
  g.appendChild(elm('text',{x:n.w/2,y:11,class:'node-title','text-anchor':'middle'},nodeTitle(n)));
  g.appendChild(elm('text',{x:n.w/2,y:21,class:'node-type-tag','text-anchor':'middle'},n.type==='4'?('🔧 '+(n.data.toolName||'plugin')):(TYPE_LABEL[n.type]+' · '+n.type)));
  // 流程端口（入口只有出口，出口只有入口）
  if(n.type!=='1'){
    const fIn=elm('circle',{cx:0,cy:HDR_H/2,r:6,class:'port-flow',title:'流程入口'});
    fIn.onmouseup=(e)=>{e.stopPropagation();finishFlow(n.id);};
    g.appendChild(fIn);
  }
  // 流程出口（2=exit、8/22=分支各自出端口、19/29=循环控制节点 均无流程出口）
  if(n.type!=='2' && !['8','19','22','29'].includes(n.type)){
    const fOut=elm('circle',{cx:n.w,cy:HDR_H/2,r:6,class:'port-flow',title:'流程出口'});
    fOut.onmousedown=(e)=>{e.stopPropagation();startFlow(n.id);};
    g.appendChild(fOut);
  }

  // 变量端口（按 nodeRows 行渲染；入口只渲染输出侧，出口只渲染输入侧）
  const rows0=nodeRows(n);
  const rows=n.type==='1'?rows0.filter(r=>r.side==='out'):n.type==='2'?rows0.filter(r=>r.side==='in'):rows0;
  const inRows=rows.filter(r=>r.side==='in'), outRows=rows.filter(r=>r.side==='out');
  const maxRows=Math.max(inRows.length,outRows.length);
  for(let ri=0;ri<maxRows;ri++){
    const ir=inRows[ri], or=outRows[ri];
    // ---- 输入侧 ----
    if(ir){
      const y=HDR_H+ri*ROW_H+ROW_H/2;
      const col=fieldColor(ir.type);
      if(!ir.sub){
        // 顶层字段端口
        const port=elm('circle',{cx:0,cy:y,r:5,class:'port-var',fill:col,stroke:col});
        port.onmouseup=(e)=>{e.stopPropagation();finishVar(n.id,ir.field,col);};
        port.onmousedown=(e)=>{e.stopPropagation();};
        g.appendChild(port);
        // object 展开标记
        if(ir.type==='object'){
          const exp=!collapsedFields.has(ir.key);
          const tg=elm('text',{x:8,y,class:'expand-toggle',fill:col},exp?'▾':'▸');
          tg.onclick=(e)=>{e.stopPropagation();toggleExpand(ir.key);};
          g.appendChild(tg);
          g.appendChild(elm('text',{x:22,y,class:'node-field-name',fill:col},ir.field));
        }else{
          // 未连线：显示输入控件（占左 2/3，placeholder=字段名）；已连线：显示字段名
          const p=nodeInputs(n).find(x=>x.name===ir.field);
          const linked=p&&inputIsLinked(p);
          if(p&&!linked){
            const fo=makeInputControl(n,p,nodeInputs(n).indexOf(p),ir.field);
            if(fo){
              const cw=Math.floor(n.w*2/3)-14;   // 左 2/3 区域
              fo.setAttribute('x',12);fo.setAttribute('y',y-8);fo.setAttribute('width',cw);fo.setAttribute('height',16);
              fo.querySelector('div').style.width=cw+'px';
              g.appendChild(fo);
            }
          }else{
            g.appendChild(elm('text',{x:10,y,class:'node-field-name',fill:col},ir.field+(ir.required?'*':'')));
          }
        }
      }else{
        // 子字段端口（按层级缩进；object 子字段可继续展开）
        const cx=8*(ir.depth||1);
        const port=elm('circle',{cx,cy:y,r:4,class:'port-var',fill:col,stroke:col});
        port.onmouseup=(e)=>{e.stopPropagation();finishVar(n.id,ir.field,col);};
        port.onmousedown=(e)=>{e.stopPropagation();};
        g.appendChild(port);
        const label=ir.field.split('.').pop();
        if(ir.type==='object'){
          const exp=!collapsedFields.has(ir.key);
          const tg=elm('text',{x:cx+6,y,class:'expand-toggle',fill:col},exp?'▾':'▸');
          tg.onclick=(e)=>{e.stopPropagation();toggleExpand(ir.key);};
          g.appendChild(tg);
          g.appendChild(elm('text',{x:cx+18,y,class:'sub-row',fill:col},label));
        }else{
          g.appendChild(elm('text',{x:cx+14,y,class:'sub-row',fill:col},label));
        }
      }
    }
    // ---- 输出侧 ----
    if(or){
      const y=HDR_H+ri*ROW_H+ROW_H/2;
      const col=fieldColor(or.type);
      if(!or.sub){
        const port=elm('circle',{cx:n.w,cy:y,r:5,class:'port-var',fill:col,stroke:col});
        port.onmousedown=(e)=>{e.stopPropagation();startVar(n.id,or.field,col,n.x+n.w,n.y+y);};
        g.appendChild(port);
        if(or.type==='object'){
          const exp=!collapsedFields.has(or.key);
          const tg=elm('text',{x:n.w-22,y,class:'expand-toggle',fill:col},exp?'▾':'▸');
          tg.onclick=(e)=>{e.stopPropagation();toggleExpand(or.key);};
          g.appendChild(tg);
          g.appendChild(elm('text',{x:n.w-32,y,class:'node-field-name','text-anchor':'end',fill:col},or.field));
        }else{
          g.appendChild(elm('text',{x:n.w-10,y,class:'node-field-name','text-anchor':'end',fill:col},or.field));
        }
      }else{
        const cx=n.w-8*(or.depth||1);
        const port=elm('circle',{cx,cy:y,r:4,class:'port-var',fill:col,stroke:col});
        port.onmousedown=(e)=>{e.stopPropagation();startVar(n.id,or.field,col,n.x+n.w,n.y+y);};
        g.appendChild(port);
        const label=or.field.split('.').pop();
        if(or.type==='object'){
          const exp=!collapsedFields.has(or.key);
          const tg=elm('text',{x:cx-16,y,class:'expand-toggle',fill:col},exp?'▾':'▸');
          tg.onclick=(e)=>{e.stopPropagation();toggleExpand(or.key);};
          g.appendChild(tg);
          g.appendChild(elm('text',{x:cx-26,y,class:'sub-row','text-anchor':'end',fill:col},label));
        }else{
          g.appendChild(elm('text',{x:cx-14,y,class:'sub-row','text-anchor':'end',fill:col},label));
        }
      }
    }
  }

  // 复合节点：画布上「✏ 编辑子画布」按钮
  if(['21','28'].includes(n.type)){
    const rows_=nodeRows(n); const yBase=HDR_H+Math.max(rows_.filter(r=>r.side==='in').length,rows_.filter(r=>r.side==='out').length)*ROW_H+4;
    const fo=document.createElementNS(NS,'foreignObject');
    fo.setAttribute('x',6);fo.setAttribute('y',yBase);fo.setAttribute('width',n.w-12);fo.setAttribute('height',24);
    const btn=document.createElement('button');
    btn.textContent='✏ 编辑子画布 ('+((n.blocks||[]).length)+' 个内部节点)';
    btn.style.cssText='width:100%;height:100%;font-size:11px;background:#1a6b6b;color:#fff;border:1px solid #7b2ff7;border-radius:4px;cursor:pointer';
    btn.onclick=(e)=>{e.stopPropagation();openComposite(n.id);};
    btn.onmousedown=(e)=>e.stopPropagation();
    fo.appendChild(btn);fo.style.pointerEvents='auto';
    g.appendChild(fo);
  }

  // 聚合节点(type32)：左侧渲染 mergeGroups 变量输入端口 + 分组标签
  // 意图识别(type22)：每个意图一个流程分支出口
  if(n.type==='22'){
    const intents=n.data.inputs?.intents||[];
    const baseYy=HDR_H+Math.max(nodeInputs(n).length,nodeOutputs(n).length)*ROW_H+8;
    intents.forEach((it,i)=>{
      const yy=baseYy+i*22;   // 每端口独立 const，避免闭包共享累加变量导致起点都落在 default
      const iname=it.name||('?'+i);
      const port=elm('circle',{cx:n.w,cy:yy,r:5,class:'port-flow',fill:'#fff',title:iname});
      port.onmousedown=(e)=>{e.stopPropagation();const pp={x:n.x+n.w,y:n.y+yy};edgeFrom={kind:'flow',nodeId:n.id,port:'branch_'+i,x:pp.x,y:pp.y,mx:pp.x,my:pp.y,color:'#fff'};renderAll();};
      g.appendChild(port);
      g.appendChild(elm('text',{x:n.w-10,y:yy+3,class:'node-type-tag','text-anchor':'end',fill:'#e6c07b'},iname));
    });
    // default 出口
    const dyy=baseYy+intents.length*22;
    const dport=elm('circle',{cx:n.w,cy:dyy,r:5,class:'port-flow',fill:'#888',title:'default'});
    dport.onmousedown=(e)=>{e.stopPropagation();const pp={x:n.x+n.w,y:n.y+dyy};edgeFrom={kind:'flow',nodeId:n.id,port:'default',x:pp.x,y:pp.y,mx:pp.x,my:pp.y,color:'#fff'};renderAll();};
    g.appendChild(dport);
    g.appendChild(elm('text',{x:n.w-10,y:dyy+3,class:'node-type-tag','text-anchor':'end',fill:'#8a9099'},'默认'));
    const bodyRect=g.querySelector('.node-body');
    if(bodyRect) bodyRect.setAttribute('height', dyy+10);
  }

  // 赋值节点(type20/40)：显示目标变量名+新值
  if(n.type==='20'||n.type==='40'){
    const ips=n.data.inputs?.inputParameters||[];
    const isLoop=n.type==='20';
    let txt='';
    ips.forEach((p,i)=>{
      const lContent=p.left?.value?.content||{};
      const vName=isLoop?(lContent.name||'?'):((lContent.path||[])[0]||'?');
      txt+=(i?', ':'')+vName;
    });
    const yBase=HDR_H+4;
    g.appendChild(elm('text',{x:n.w/2,y:yBase+12,class:'node-field-name','text-anchor':'middle',fill:'#fff'},'✏ '+(isLoop?'置':'赋')+'值: '+txt));
    const bodyRect=g.querySelector('.node-body');
    if(bodyRect) bodyRect.setAttribute('height', Math.max(nodeH(n), HDR_H+30));
  }

  // 聚合节点(type32)：先算高度，不重画rect只更新height
  if(n.type==='32'){
    const groups=n.data.inputs?.mergeGroups||[];
    let gy=HDR_H+8;
    groups.forEach(grp=>{
      const vars=grp.variables||[];
      gy+=28+Math.max((vars.length-1)*18,0)+10;
    });
    n.h=gy+20;
    // 更新已画的 rect height
    const bodyRect=g.querySelector('.node-body');
    if(bodyRect) bodyRect.setAttribute('height', n.h);
    gy=HDR_H+8;
    groups.forEach(grp=>{
      const gname=grp.name||'?';
      const gtype=nodeOutputs(n).find(o=>o.name===gname)?.type||'string';
      const col=fieldColor(gtype);
      g.appendChild(elm('text',{x:6,y:gy+12,class:'node-field-name',fill:col},gname));
      const vars=grp.variables||[];
      vars.forEach((v,i)=>{
        const vy=gy+12+(i+1)*18;
        const port=elm('circle',{cx:10,cy:vy,r:4,class:'port-var',fill:col,stroke:col});
        port.onmouseup=(e)=>{e.stopPropagation();finishAggrVar(n.id,gname,i,col);};
        port.onmousedown=(e)=>{e.stopPropagation();};
        g.appendChild(port);
        g.appendChild(elm('text',{x:20,y:vy+3,class:'sub-row',fill:col},'var'+(i+1)));
      });
      const outP=elm('circle',{cx:n.w,cy:gy+12,r:5,class:'port-var',fill:col,stroke:col});
      outP.onmousedown=(e)=>{e.stopPropagation();startVar(n.id,gname,col,n.x+n.w,n.y+gy+12);};
      g.appendChild(outP);
      const vars2=grp.variables||[];
      gy+=28+Math.max((vars2.length-1)*18,0)+10;
    });
  }

  // 文本节点：大文本框（编辑 concatResult，支持 {{输入字段}} 占位符）
  if(n.type==='15'){
    const fo=makeTextArea(n);
    if(fo){
      const yBase=HDR_H+Math.max(nodeInputs(n).length,nodeOutputs(n).length)*ROW_H+4;
      fo.setAttribute('x',6);fo.setAttribute('y',yBase);fo.setAttribute('width',n.w-12);fo.setAttribute('height',TEXTAREA_H-8);
      g.appendChild(fo);
    }
  }

  // 选择器：分支行 + 每分支流程出口（foreignObject）
  if(n.type==='8'){
    renderSelectorBranches(g,n);
  }

  // 交互
  g.ondblclick=(e)=>{
    if(['21','28'].includes(n.type)){e.stopPropagation();openComposite(n.id);}
  };
  g.onmousedown=(e)=>{
    if(e.button!==0)return;
    if(e.target.classList.contains('port-flow')||e.target.classList.contains('port-var'))return;
    e.stopPropagation();
    const sp=svgPos(e); dragNode=n.id; dragDX=n.x-sp.x; dragDY=n.y-sp.y;
    selNode=n.id; selEdge=null; showProps(); renderAll();
  };
  // 代码节点：画布上显示前几行代码预览
  if(n.type==='5'){
    const codePreview=makeCodePreview(n);
    if(codePreview){
      const yBase=HDR_H+Math.max(nodeInputs(n).length,nodeOutputs(n).length)*ROW_H+4;
      codePreview.setAttribute('x',6);codePreview.setAttribute('y',yBase);
      codePreview.setAttribute('width',n.w-12);codePreview.setAttribute('height',36);
      g.appendChild(codePreview);
    }
  }
  return g;
}

// 未连线输入控件（placeholder=字段名，宽度由调用方设置）
function makeInputControl(n,p,i,ph){
  const t=p.input?.type||'string';
  const v=p.input?.value;
  const fo=document.createElementNS(NS,'foreignObject');
  fo.setAttribute('width',80);fo.setAttribute('height',16);
  const div=document.createElement('div');
  div.style.cssText='width:80px;height:16px;display:flex;align-items:center';
  const cur=(v?.type==='literal')?v.content:'';
  const baseStyle='width:100%;font-size:10px;padding:0 2px;background:#0f3460;color:#fff;border:1px solid #533483;border-radius:2px';
  if(t==='list'||t==='array'){
    const inp=document.createElement('input');inp.type='text';inp.value=cur;inp.placeholder='[1,2,3] 或 [\"a\",\"b\"]';
    inp.style.cssText=baseStyle;
    inp.onchange=()=>{setInputLiteral(n.id,i,{type:'literal',content:inp.value});};
    inp.onmousedown=(e)=>e.stopPropagation();
    div.appendChild(inp);
  }else if(t==='boolean'){
    const lab=document.createElement('label');
    lab.style.cssText='font-size:10px;display:flex;align-items:center;gap:2px;color:'+fieldColor(t);
    const cb=document.createElement('input');cb.type='checkbox';cb.checked=!!cur||cur===true||cur==='true';
    cb.style.cssText='margin:0;transform:scale(0.8)';
    const span=document.createElement('span');span.textContent=ph||p.name;
    cb.onchange=()=>{setInputLiteral(n.id,i,{type:'literal',content:cb.checked});};
    cb.onmousedown=(e)=>e.stopPropagation();
    lab.appendChild(cb);lab.appendChild(span);div.appendChild(lab);
  }else if(['integer','number','float'].includes(t)){
    const inp=document.createElement('input');inp.type='number';inp.value=cur;inp.placeholder=ph||p.name;
    inp.style.cssText=baseStyle;
    inp.onchange=()=>{const num=parseFloat(inp.value);setInputLiteral(n.id,i,{type:'literal',content:isNaN(num)?inp.value:num});};
    inp.onmousedown=(e)=>e.stopPropagation();
    div.appendChild(inp);
  }else{
    const inp=document.createElement('input');inp.type='text';inp.value=cur;inp.placeholder=ph||p.name;
    inp.style.cssText=baseStyle;
    inp.onchange=()=>{setInputLiteral(n.id,i,{type:'literal',content:inp.value});};
    inp.onmousedown=(e)=>e.stopPropagation();
    div.appendChild(inp);
  }
  fo.appendChild(div);
  fo.style.pointerEvents='auto';
  return fo;
}
function setInputLiteral(nodeId,i,value){
  const n=findN(nodeId);if(!n)return;
  n.data.inputs.inputParameters[i].input.value=value;
  renderAll();
}

// 文本节点大文本框
function makeTextArea(n){
  const fo=document.createElementNS(NS,'foreignObject');
  fo.setAttribute('width',200);fo.setAttribute('height',100);
  const ta=document.createElement('textarea');

// 从目标端点拽出：松手若不在端口上则断开该线
function startDisconnect(info, sp, color){
  edgeFrom={kind:'disconnect',info,sp,mx:sp.x,my:sp.y,color};
  renderAll();
}
function doDisconnect(info){
  if(info.kind==='flow'){
    WF.edges.splice(info.i,1);
    toast('已断开流程线');
  }else if(info.kind==='var'){
    const tn=findN(info.tgtNode);
    if(info.aggrGi!=null && tn?.type==='32'){
      // 聚合节点变量：清 mergeGroups[gi].variables[vi]
      const grp=tn.data.inputs?.mergeGroups?.[info.aggrGi];
      if(grp){grp.variables=grp.variables||[];grp.variables[info.aggrVi]={type:'string',value:{type:'literal',content:''}};toast('已断开变量线');}
    }else{
      const p=tn?.data.inputs.inputParameters.find(x=>x.name===info.tgtField);
      if(p){p.input.value={type:'literal',content:''};toast('已断开变量线');}
    }
  }
  showProps();renderAll();
}
function startFlow(nodeId){const n=findN(nodeId);const p=flowOutPos(n);edgeFrom={kind:'flow',nodeId,x:p.x,y:p.y,mx:p.x,my:p.y,color:'#fff'};renderAll();}
function startVar(nodeId,field,color,x,y){edgeFrom={kind:'var',nodeId,field,x,y,mx:x,my:y,color};renderAll();}
function finishFlow(tgtId){
  if(!edgeFrom||edgeFrom.kind!=='flow'){edgeFrom=null;renderAll();return;}
  if(edgeFrom.nodeId===tgtId){edgeFrom=null;renderAll();return;}
  const port=edgeFrom.port||'';   // 分支端口(branch_N/true/default)或空(普通出口)
  // 同一出端口只保留一条（普通节点出口线性；selector/intent 每分支一个下游）
  WF.edges=WF.edges.filter(e=>!(e.sourceNodeID===edgeFrom.nodeId&&e.sourcePortID===port));
  WF.edges.push({sourceNodeID:edgeFrom.nodeId,targetNodeID:tgtId,sourcePortID:port});
  edgeFrom=null;renderAll();
}
function finishVar(tgtId,field,color){
  if(!edgeFrom||edgeFrom.kind!=='var'){edgeFrom=null;renderAll();return;}
  if(edgeFrom.color!==color){edgeFrom=null;toast('类型不匹配：只能连相同颜色的端口');renderAll();return;}
  if(edgeFrom.nodeId===tgtId){edgeFrom=null;renderAll();return;}
  const tn=findN(tgtId);if(!tn){edgeFrom=null;renderAll();return;}
  // field 可能是子字段 "obj.sub" → 定位父字段 obj
  const parent=field.split('.')[0];
  const p=tn.data.inputs.inputParameters.find(x=>x.name===parent);
  if(!p){edgeFrom=null;toast('目标无匹配输入字段');renderAll();return;}
  // 源可能是子字段(点号)或整对象；name 用完整路径，执行器按点号取值
  // type20 的值存在 right 里
  const target=tn.type==='20'?p.right:p.input;
  if(!target){p.input={type:'string',value:{}};target=p.input;}
  target.value={type:'ref',content:{source:'block-output',blockID:edgeFrom.nodeId,name:edgeFrom.field}};
  if(field.includes('.')) target.type=color2type(color);
  // 复合节点 input 被连线→自动解析源 item schema→初始化 item 类型
  if(['21','28'].includes(tn.type)&&parent==='input'){
    const sn=findN(edgeFrom.nodeId);
    const srcOut=sn?.data?.outputs?.find(o=>o.name===edgeFrom.field);
    if(srcOut&&srcOut.type==='list'){
      const itemSch=srcOut.schema;
      if(itemSch){tn.data.inputs.inputParameters.find(x=>x.name==='input').input.schema=itemSch;}
      // 同步 nth_output 类型
      const nth=nodeOutputs(tn).find(o=>o.name==='nth_output');
      if(nth){
        if(Array.isArray(itemSch)){nth.type='object';nth.schema=[...itemSch];}
        else if(itemSch&&itemSch.type){nth.type=itemSch.type;delete nth.schema;}
        _syncListSchema();
      }
      toast('已解析 item schema: '+(Array.isArray(itemSch)?itemSch.map(s=>s.name).join(','):(itemSch?.type||'?')));
    }
  }
  edgeFrom=null;selNode=tgtId;showProps();renderAll();
  toast('已连接：'+edgeFrom?.field||field);
}
function color2type(col){return Object.entries(TYPE_COLOR).find(([k,v])=>v===col)?.[0]||'string';}
function svgPos(e){const r=svg.getBoundingClientRect();return{x:(e.clientX-r.left)/dz,y:(e.clientY-r.top)/dz};}

  if(selEdge&&selEdge.kind==='flow'){WF.edges.splice(selEdge.i,1);selEdge=null;renderAll();}

function closeNodePicker(){document.getElementById('nodePicker').style.display='none';pickerCtx=null;}
function renderNodePicker(filter){
  const d=document.getElementById('nodePicker');
  const fv=filter||'';

  const old=document.getElementById('npFilter');
  const hadFocus=old&&document.activeElement===old;
  const caret=old?old.selectionStart:0;
  let html=`<input id="npFilter" class="np-filter" placeholder="🔍 过滤节点/工具…" value="${ext(fv)}" oninput="renderNodePicker(this.value)">`;
  // 节点按类别分组（开始/结束无需手动创建，新建工作流自带）
  NODE_GROUPS.forEach(g=>{
    const items=g.items.filter(b=>!f||b[1].toLowerCase().includes(f));
    if(items.length){
      html+=`<div class="np-group">${ext(g.title)}</div><div class="np-row">`;
      html+=items.map(b=>`<button class="np-item" onclick="pickNode('${b[0]}')">${ext(b[1])}</button>`).join('');
      html+='</div>';
    }
  });
  // Agent 工具按来源分组，全部列出
  const tg={};
  (AGENT_TOOLS||[]).forEach(t=>{const gr=t.group||'工具';(tg[gr]=tg[gr]||[]).push(t);});
  Object.keys(tg).sort().forEach(g=>{
    const items=tg[g].filter(t=>!f||(t.name||'').toLowerCase().includes(f)||(t.display||'').toLowerCase().includes(f));
    if(items.length){
      html+=`<div class="np-group">${ext(g)} <span style="color:#5a6068;font-weight:normal">${items.length}</span></div><div class="np-row">`;
      html+=items.map(t=>`<button class="np-item" onclick="pickNode('${t.name}',true)" title="${ext(t.display||t.name)+' — '+(t.description||'')}">🔧 ${ext(t.display||t.name)}</button>`).join('');

function pickNode(typeOrName,isTool){
  if(!pickerCtx){closeNodePicker();return;}
  let n;
  if(isTool){
    const t=(AGENT_TOOLS||[]).find(z=>z.name===typeOrName);
    if(!t){closeNodePicker();return;}
    const inputParameters=t.params.map(p=>({name:p.name,input:{type:_mapToolType(p.type),value:{type:'literal',content:''}}}));
    const outputs=(t.outputs||[{name:'raw',type:'string',description:'工具返回'}]).map(o=>({name:o.name,type:o.type||'string',description:o.description||''}));
    n={id:genId(),type:'4',x:pickerCtx.sx,y:pickerCtx.sy,w:230,h:80,data:{nodeMeta:{title:t.display||typeOrName},toolName:typeOrName,inputs:{inputParameters},outputs}};
    WF.nodes.push(n);
  }else{
    n=createBasicNode(typeOrName,pickerCtx.sx,pickerCtx.sy);
  }
  if(pickerCtx.src){   // 拖线触发：连源节点该端口 → 新节点
    const port=pickerCtx.src.port||'';
    WF.edges=WF.edges.filter(e=>!(e.sourceNodeID===pickerCtx.src.nodeId&&e.sourcePortID===port));
    WF.edges.push({sourceNodeID:pickerCtx.src.nodeId,targetNodeID:n.id,sourcePortID:port});
  }
  closeNodePicker();
  selNode=n.id;showProps();renderAll();
}

// ============ 属性面板（浮框：选中节点显示，空白隐藏）============
function showProps(){
  const wrap=document.getElementById('propsFloat');
  const p=document.getElementById('propsContent');
  if(!selNode){wrap.style.display='none';p.innerHTML='';return;}
  const n=findN(selNode);if(!n){wrap.style.display='none';p.innerHTML='';return;}
  wrap.style.display='block';
  try{
  let h=`<h3>节点</h3>
    <label>标题 <input value="${ext(nodeTitle(n))}" onchange="setTitle(this.value)"></label>
    <label>ID <input value="${n.id}" ${['100001','900001'].includes(n.id)?'readonly':''} onchange="setProp('id',this.value)"></label>
    <label>类型 <select onchange="setProp('type',this.value)">${Object.entries(TYPE_LABEL).map(([k,v])=>`<option value="${k}" ${n.type===k?'selected':''}>${v} (${k})</option>`).join('')}</select></label>
    <label>位置 X/Y <input type="number" value="${n.x}" onchange="setProp('x',+this.value)" style="width:45%;display:inline-block"> <input type="number" value="${n.y}" onchange="setProp('y',+this.value)" style="width:45%;display:inline-block;float:right"></label>
    <label>宽度 <input type="number" value="${n.w}" onchange="setProp('w',+this.value)"></label>`;

  // 复合节点：编辑按钮 + 专属配置
  if(['21','28'].includes(n.type)){
    h+='<div style="margin:6px 0"><button onclick="openComposite(\''+n.id+'\')" style="width:100%;padding:8px;font-size:14px;background:#1a6b6b;color:#fff;border:2px solid #7b2ff7;border-radius:6px;cursor:pointer">✏ 编辑子画布 ('+((n.blocks||[]).length)+' 个内部节点)</button></div>';
    // array 源：从输入字段中选
    const arrSrc=n.data.inputs?.inputParameters?.find(p=>p.input?.type==='list');
    const arrName=arrSrc?.name||'(未设置)';
    const itemSchema=arrSrc?.input?.schema;
    const itemType=itemSchema?.type||(Array.isArray(itemSchema)?'object':'string');
    h+='<h3>复合配置</h3>';
    h+='<label>数组源 <span style="color:#98c379">'+arrName+'</span>（'+(nodeInputs(n).filter(p=>p.input?.type==='list').length)+' 个 list 型输入）';
    if(nodeInputs(n).filter(p=>p.input?.type==='list').length>1)
      h+=' <select onchange="setCompArraySrc(this.value)">'+nodeInputs(n).filter(p=>p.input?.type==='list').map(p=>'<option value='+p.name+(arrName===p.name?' selected':'')+'>'+p.name+'</option>').join('')+'</select>';
    h+='</label>';
    // item 类型
    h+='<label>item 类型 <span style="color:#56b6c2">'+itemType+'</span>'+(Array.isArray(itemSchema)?' ('+itemSchema.map(s=>s.name).join(', ')+')':'')+'</label>';
    // 本地变量
    const vps=n.data.inputs?.variableParameters||[];
    h+='<h3>本地变量 <button onclick="addLocalVar()">+</button></h3>';
    vps.forEach((vp,i)=>{
      h+='<div style="display:flex;gap:2px;margin:2px 0"><input value="'+ext(vp.name)+'" onchange="setLocalVar('+i+',\'name\',this.value)" style="flex:1"><input value="'+ext(vp.input?.value?.content)+'" placeholder="初值" onchange="setLocalVar('+i+',\'init\',this.value)" style="width:60px"><select onchange="setLocalVar('+i+',\'type\',this.value)" style="width:65px">'+IO_TYPES.map(t=>'<option value='+t+(vp.input?.type===t?' selected':'')+'>'+t+'</option>').join('')+'</select><button class="del" onclick="delLocalVar('+i+')">×</button></div>';
    });
    h+='<div style="font-size:10px;color:#8a9099">本地变量在进入复合节点时初始化，子画布内可用 LoopSetVariable(赋值节点) 修改。</div>';
    // 筛选 (filtered_outputs)——多条件 + AND/OR
    const b=n.data.inputs?.batch||{};
    const filt=b.filter||{logic:2,conditions:[]};
    if(!filt.conditions.length)filt.conditions.push({operator:14,left:{input:{type:'integer',value:{type:'ref',content:{source:'block-output',blockID:'__batch_output__',name:''}}}},right:{input:{type:'integer',value:{type:'literal',content:''}}}});
    h+='<h3>筛选条件 (filtered_outputs) <select onchange="setCompLogic(parseInt(this.value))" style="width:auto;font-size:10px"><option value="2"'+(filt.logic!==1?' selected':'')+'>AND</option><option value="1"'+(filt.logic===1?' selected':'')+'>OR</option></select></h3>';
    // 收集可用输出字段（含 object 子字段）
    // 收集可用筛选字段：从输出的 item schema 取字段
    const outFields=[];
    nodeOutputs(n).forEach(o=>{
      if(o.name==='all_outputs'||o.name==='filtered_outputs'||o.name==='nth_output'){
        // list 输出，schema 是 item 类型：{type:'string'} 或 [{name,type}](object字段数组)
        const sch=o.schema;
        if(Array.isArray(sch)){
          // item 是 object，有字段
          sch.forEach(sf=>outFields.push(sf.name));
        }else if(sch&&sch.type==='object'){
          // item 是 object，schema 可能在 schema.fields
          (sch.fields||[]).forEach(sf=>outFields.push(sf.name));
        }
        // item 是基础类型(string/int)时无字段，不加入
      }else{
        // 普通输出字段
        outFields.push(o.name);
        if(o.type==='object'&&Array.isArray(o.schema)){o.schema.forEach(sf=>outFields.push(o.name+'.'+sf.name));}
      }
    });
    filt.conditions.forEach((c,ci)=>{
      const isUnary=[9,10,11,12].includes(c.operator);
      const rv=c.right?.input?.value||{};
      const rIsRef=rv.type==='ref';
      const lName=c.left?.input?.value?.content?.name||'';
      h+='<div style="display:flex;gap:2px;margin:2px 0;flex-wrap:wrap;align-items:center">';
      // 左值：下拉选输出字段
      h+='<select onchange="setCompFilt('+ci+',\'left\',this.value)" style="width:90px;font-size:10px"><option value="">--字段--</option>'+outFields.map(fn=>'<option value="'+fn+'"'+(lName===fn?' selected':'')+'>'+fn+'</option>').join('')+'</select>';
      h+='<select onchange="setCompFilt('+ci+',\'op\',parseInt(this.value))" style="width:45px;font-size:10px">'+OPERATORS.map(o=>'<option value='+o.v+(c.operator===o.v?' selected':'')+'>'+o.t+'</option>').join('')+'</select>';
      if(!isUnary){
        h+='<select onchange="setCompFiltSrc('+ci+',this.value)" style="width:auto;font-size:10px"><option value="literal"'+(!rIsRef?' selected':'')+'>literal</option><option value="ref"'+(rIsRef?' selected':'')+'>ref</option></select>';
        if(rIsRef) h+='<input value="'+ext(rv.content?.name||'')+'" placeholder="字段名" onchange="setCompFilt('+ci+',\'refName\',this.value)" style="width:60px;font-size:10px">';
        else {h+='<input value="'+ext(rv.content)+'" placeholder="值" onchange="setCompFilt('+ci+',\'right\',this.value)" style="width:60px;font-size:10px">';h+='<select onchange="setCompFilt('+ci+',\'type\',this.value)" style="width:auto;font-size:10px">'+IO_TYPES.map(t=>'<option value='+t+(c.right?.input?.type===t?' selected':'')+'>'+t+'</option>').join('')+'</select>';}
      }
      h+='<button class="del" onclick="delCompFilt('+ci+')">×</button></div>';
    });
    h+='<button onclick="addCompFilt()">+ 条件</button> ';
    // nth
    h+='<label>nth_output 取第几个 <input type="number" value="'+ext(b.nth,0)+'" onchange="setBatch(\'nth\',parseInt(this.value)||0)" style="width:60px">（负/越界=最后, 空=null）</label>';

    // 循环专属
    if(n.type==='21'){
      h+='<h3>循环设置</h3>';
      h+='<label>类型 <select onchange="setLoop(\'loopType\',this.value)"><option value="array" '+(n.data.inputs?.loopType==='array'?'selected':'')+'>array</option><option value="count" '+(n.data.inputs?.loopType==='count'?'selected':'')+'>count</option><option value="infinite" '+(n.data.inputs?.loopType==='infinite'?'selected':'')+'>infinite</option></select></label>';
      if(n.data.inputs?.loopType!=='array')
        h+='<label>次数 <input value="'+ext(n.data.inputs?.loopCount?.value?.content)+'" onchange="setLoop(\'loopCount\',this.value)"></label>';
    }
  }

  // 输入字段（聚合节点用 mergeGroups，跳过常规输入）
  if(n.type!=='1'&&n.type!=='32'){
    const label=n.type==='2'?'输出映射（返回变量绑定）':'输入字段';
    const lockedInputs=['4','9'].includes(n.type);  // 工具/子工作流输入来自schema，锁定
    h+=`<h3>${label} ${lockedInputs?'🔒(来自工具schema，不可改)':'<button onclick=\"addIO(\'in\')\">+ 添加</button> <button onclick=\"importJSONSchema(\'in\')\" title=\"粘贴JSON自动分析结构并初始化输入字段\">📋 从JSON导入</button>'}</h3>`;
    h+=renderIOFields(nodeInputs(n),'in');
  }
  // 输出字段（入口=工作流入参；意图/聚合无输出字段编辑）
  // 输出字段（入口=工作流入参；选择器/意图/聚合/复合无输出字段编辑）
  if(n.type!=='2' && !['8','21','22','28','32'].includes(n.type)){
    const label=n.type==='1'?'输入（工作流入参）':'输出字段';
    h+=`<h3>${label} <button onclick="addIO('out')">+ 添加</button> <button onclick="importJSONSchema('out')" title="粘贴JSON自动分析结构并初始化字段">📋 从JSON导入</button></h3>`;
    h+=renderIOFields(nodeOutputs(n),'out');
  }
  // 复合节点输出：nth_output 可编辑字段（定义 item 结构），all/filtered 自动跟随
  if(['21','28'].includes(n.type)){
    const outs=nodeOutputs(n);
    const nthIdx=outs.findIndex(o=>o.name==='nth_output');
    h+='<h3>输出结构（nth_output，all/filtered 自动跟随）</h3>';
    if(nthIdx>=0){
      h+='<div style="font-size:10px;color:#8a9099;margin-bottom:2px">类型: <select onchange="setNthType(this.value)">'+IO_TYPES.map(t=>'<option value='+t+(outs[nthIdx].type===t?' selected':'')+'>'+t+'</option>').join('')+'</select></div>';
      if(outs[nthIdx].type==='object'||Array.isArray(outs[nthIdx].schema)){
        h+='<div style="font-size:10px;color:#8a9099;margin:4px 0">字段（每轮输出的 item 结构）:</div>';
        h+=renderObjectSubFields(outs[nthIdx],'out',nthIdx,'object');
      }else{
        h+='<div style="font-size:10px;color:#8a9099">item 类型为 '+outs[nthIdx].type+'（基础类型，无子字段）</div>';
      }
    }
    h+='<div style="font-size:10px;color:#56b6c2;margin-top:4px">all_outputs / filtered_outputs 的 item 类型 = nth_output，自动同步。</div>';
  }

  // 批处理（排除 entry/exit/复合/选择器/意图/聚合/赋值）
  if(!['1','2','8','20','21','22','28','32','40'].includes(n.type)){
    h+=renderBatchConfig(n);
  }

  // LLM
  if(n.type==='3'){
    h+='<h3>LLM 提示词</h3>';
    const lp=n.data.inputs?.llmParam||[];
    const prompt=lp.find(x=>x.name==='prompt'), sys=lp.find(x=>x.name==='systemPrompt');
    h+=`<label>systemPrompt <textarea onchange="setLLM('systemPrompt',this.value)">${ext(sys?.input?.value?.content)}</textarea></label>`;
    h+=`<label>prompt <textarea onchange="setLLM('prompt',this.value)">${ext(prompt?.input?.value?.content)}</textarea></label>`;
    h+='<div style="font-size:10px;color:#8a9099">输出字段的结构会作为 JSON Schema 自动并入 systemPrompt。</div>';
  }
  // 代码节点
  if(n.type==='5'){
    h+=`<h3>Python 代码</h3><label><textarea style="min-height:200px" onchange="setCode(this.value)">${ext(n.data.inputs?.code)}</textarea></label>`;
    h+='<div style="font-size:10px;color:#8a9099">通过 args.params 取输入，ret: Output = {...} 返回输出；输出字段需与返回结构匹配。</div>';
  }
  // 聚合节点(type32)：mergeGroups 编辑器
  if(n.type==='32'){
    h+='<h3>聚合分组 <button onclick="addAggrGroup()">+分组</button></h3>';
    const groups=n.data.inputs?.mergeGroups||[];
    groups.forEach((g,i)=>{
      h+='<div style="margin:4px 0;padding:4px;background:#0f3460;border-radius:4px">';
      h+='<span>分组名:</span><input value="'+ext(g.name)+'" onchange="setAggrGroupName('+i+',this.value)" style="width:80px">';
      h+='<span> 变量('+(g.variables||[]).length+') </span>';
      h+='<button onclick="addAggrVar('+i+')">+变量</button>';
      h+='<button class="del" onclick="delAggrGroup('+i+')">×删分组</button>';
      (g.variables||[]).forEach((v,vi)=>{
        const isRef=v.value?.type==='ref';
        h+='<div style="font-size:10px;margin:2px 0"> 变量'+(vi+1)+': ';
        if(isRef)h+='ref→'+ext(v.value?.content?.blockID)+'.'+ext(v.value?.content?.name);
        else h+='literal:'+ext(v.value?.content);
        h+=' <button class="del" onclick="delAggrVar('+i+','+vi+')">×</button></div>';
      });
      h+='</div>';
    });
  }

  // 置变量(循环) type20 / 赋值(全局) type40 — left/right 专用编辑
  if(n.type==='20'||n.type==='40'){
    const isLoop=n.type==='20';
    h+='<h3>'+(isLoop?'循环内置变量 (修改复合节点的本地变量)':'赋值 (修改全局变量)')+'</h3>';
    const ips=n.data.inputs?.inputParameters||[];
    ips.forEach((p,i)=>{
      const rBlock=(isLoop?p.right:p.input)||{};
      const rVal=rBlock.value||{};
      const isRef=rVal.type==='ref';
      const lContent=p.left?.value?.content||{};
      const varName=isLoop?(lContent.name||''):((lContent.path||[])[0]||'');
      const newVal=isRef?('→ '+ext(rVal.content?.blockID)+'.'+ext(rVal.content?.name)):ext(rVal.content);
      h+='<div style="margin:4px 0;padding:6px;background:#0f3460;border-radius:4px">';
      h+='<div style="font-size:11px;color:#8a9099;margin-bottom:2px">'+(isLoop?'本地变量名（在复合节点 variableParameters 中声明）':'全局变量名（如 app_var1）')+'</div>';
      h+='<input value="'+varName+'" placeholder="'+(isLoop?'如 acc, greeting(复合节点variableParameters中的名字)':'如 app_var1(全局变量名)')+'" onchange="setVarName('+i+',this.value)" style="width:100%;font-size:11px;margin-bottom:4px">';
      if(isRef){
        h+='<div style="font-size:11px;color:#98c379;margin-bottom:2px">⇩ 新值 = '+newVal+'（已从上游连线，拖线覆盖或填字面量切换）</div>';
      }else{
        h+='<div style="font-size:11px;color:#8a9099;margin-bottom:2px">⇩ 新值（填字面量，或从上游拖变量线连本行左侧端口）</div>';
        h+='<input value="'+ext(rVal.content)+'" placeholder="新值" onchange="setVarVal('+i+',this.value)" style="width:100%;font-size:11px">';
      }
      h+='<button class="del" onclick="delIO(\'in\','+i+')" style="margin-top:3px">× 删除此行</button></div>';
    });
    h+='<button onclick="addIO(\'in\')">+ 添加赋值</button>';
  }

  // 意图识别：选项增删改
  if(n.type==='22'){
    h+='<h3>意图选项（每项一个分支出口）</h3>';
    const intents=n.data.inputs?.intents||[];
    intents.forEach((it,i)=>{
      h+='<div style="display:flex;gap:3px;margin:2px 0;align-items:center"><span style="font-size:10px;color:#8a9099">'+(i+1)+'.</span><input value="'+ext(it.name)+'" placeholder="意图名" onchange="setIntent('+i+',this.value)" style="flex:1;font-size:11px"><button class="del" onclick="delIntent('+i+')">×</button></div>';
    });
    h+='<button onclick="addIntent()">+ 意图</button>';
    h+='<div style="font-size:10px;color:#8a9099;margin-top:4px">LLM 分类后路由到对应分支(branch_N)，未命中走默认。每意图在画布右侧有一个流程出口。</div>';
  }

  // HTTP 节点编辑
  if(n.type==='45'){
    const api=n.data.inputs?.apiInfo||{};
    h+='<h3>HTTP 请求</h3>';
    h+='<label>方法 <select onchange="setHttp(\'method\',this.value)"><option value="GET"'+(api.method==='GET'?' selected':'')+'>GET</option><option value="POST"'+(api.method==='POST'?' selected':'')+'>POST</option><option value="PUT"'+(api.method==='PUT'?' selected':'')+'>PUT</option><option value="DELETE"'+(api.method==='DELETE'?' selected':'')+'>DELETE</option></select></label>';
    h+='<label>URL <input value="'+ext(api.url)+'" onchange="setHttp(\'url\',this.value)" placeholder="https://... 支持 {{字段名}} 占位符"></label>';
    // POST 请求体
    if(api.method==='POST'||api.method==='PUT'){
      const bd=n.data.inputs?.body||{};
      h+='<label>请求体类型 <select onchange="setHttp(\'bodyType\',this.value)"><option value="EMPTY"'+(!bd.bodyType||bd.bodyType==='EMPTY'?' selected':'')+'>无</option><option value="JSON"'+(bd.bodyType==='JSON'?' selected':'')+'>JSON</option><option value="FORM_URLENCODED"'+(bd.bodyType==='FORM_URLENCODED'?' selected':'')+'>表单(URL编码)</option><option value="RAW_TEXT"'+(bd.bodyType==='RAW_TEXT'?' selected':'')+'>纯文本</option></select></label>';
      if(bd.bodyType==='JSON'){
        h+='<label>JSON 体 <textarea onchange="setHttp(\'bodyJson\',this.value)" style="min-height:80px">'+ext((bd.bodyData||{}).json)+'</textarea></label>';
        h+='<div style="font-size:10px;color:#8a9099">支持 {{输入字段名}} 占位符引用上游数据</div>';
      }
      if(bd.bodyType==='RAW_TEXT'){
        h+='<label>文本体 <textarea onchange="setHttp(\'bodyText\',this.value)" style="min-height:60px">'+ext((bd.bodyData||{}).rawText)+'</textarea></label>';
      }
      if(bd.bodyType==='FORM_URLENCODED'){
        h+='<label>表单字段</label>';
        const fields=(bd.bodyData||{}).formURLEncoded||[];
        fields.forEach((p,pi)=>{h+='<div style="display:flex;gap:3px;margin:2px 0"><input value="'+ext(p.name)+'" placeholder="键" onchange="setHttpForm('+pi+',\'name\',this.value)" style="flex:1;font-size:10px"><input value="'+ext(p.input?.value?.content)+'" placeholder="值" onchange="setHttpForm('+pi+',\'val\',this.value)" style="flex:2;font-size:10px"><button class="del" onclick="delHttpForm('+pi+')">×</button></div>';});
        h+='<button onclick="addHttpForm()" style="font-size:10px">+ 字段</button>';
      }
    }
    h+='<label>超时(秒) <input type="number" value="'+ext((n.data.inputs?.setting||{}).timeout,15)+'" onchange="setHttp(\'timeout\',parseInt(this.value)||15)"></label>';
  }

  // 子工作流: workflowId 下拉选择
  if(n.type==='9'){
    h+='<h3>子工作流</h3><label>调用 <select onchange="setSubWf(this.value)"><option value="">选择工作流…</option>';
    const curWfId=n.data.inputs?.workflowId||'';
    (WFLIST||[]).forEach(w=>{h+='<option value="'+w.name+'"'+(curWfId===w.name?' selected':'')+'>'+w.name+(w.description?' - '+w.description.slice(0,30):'')+'</option>';});
    h+='</select></label>';
  }

  // 选择器：分支条件编辑器
  if(n.type==='8'){
    h+='<h3>选择器分支</h3>';
    const branches=n.data.inputs?.branches||[];
    branches.forEach((br,bi)=>{
      const cond=br.condition||{logic:2,conditions:[]};
      const lc=cond.conditions?.[0]||{operator:1,left:{input:{type:'string',value:{type:'ref',content:{source:'block-output',blockID:'',name:''}}}},right:{input:{type:'string',value:{type:'literal',content:''}}}};
      const lv=lc.left?.input?.value||{};
      const rv=lc.right?.input?.value||{};
      const lIsRef=lv.type==='ref', rIsRef=rv.type==='ref';
      const lSrc=lIsRef?(lv.content?.source||'block-output'):'literal';
      const rSrc=rIsRef?(rv.content?.source||'block-output'):'literal';
      h+='<div style="margin:4px 0;padding:6px;background:#0f3460;border-radius:4px">分支'+(bi+1)+' <button class="del" onclick="delBranch('+bi+')">×</button><br>';
      // left
      h+='<span style="font-size:10px">左:</span> <select onchange="setCondSrc('+bi+',0,\'left\',this.value)" style="width:auto;font-size:10px">';
      ['block-output','literal','loop-item','loop-index','global_variable_app'].forEach(s=>{h+='<option value='+s+(lSrc===s?' selected':'')+'>'+s+'</option>';});
      h+='</select>';
      if(lSrc==='block-output'){
        // 跨节点选上游输出字段（含 object 子字段点号路径）
        h+='<select onchange="setCondRef('+bi+',0,\'left\',this.value)" style="width:auto;font-size:10px"><option value="">--选择节点字段--</option>';
        h+=_condRefOptions(n,lv.content);
        h+='</select>';
      }else if(lIsRef){
        h+='<input value="'+ext(lv.content?.name||(lv.content?.path||[])[0]||'')+'" placeholder="字段/变量名" onchange="setCondRef('+bi+',0,\'left\',this.value)" style="width:80px;font-size:10px">';
      }else{
        h+='<input value="'+ext(lv.content)+'" placeholder="字面量" onchange="setCondLit('+bi+',0,\'left\',this.value)" style="width:80px;font-size:10px">';
        h+='<select onchange="setCondType('+bi+',0,\'left\',this.value)" style="width:auto;font-size:10px">'+IO_TYPES.map(t=>'<option value='+t+(lc.left?.input?.type===t?' selected':'')+'>'+t+'</option>').join('')+'</select>';
      }
      // op
      const isUnary=[9,10,11,12].includes(lc.operator);  // 为空/非空/True/False 不需要右值
      h+=' <select onchange="setCondOp('+bi+',0,parseInt(this.value))" style="width:auto;font-size:10px">';
      OPERATORS.forEach(o=>{h+='<option value='+o.v+(lc.operator===o.v?' selected':'')+'>'+o.t+'</option>';});
      h+='</select> ';
      // right（一元运算符不显示）
      if(!isUnary){
      h+='<select onchange="setCondSrc('+bi+',0,\'right\',this.value)" style="width:auto;font-size:10px">';
      ['block-output','literal','loop-item','loop-index','global_variable_app'].forEach(s=>{h+='<option value='+s+(rSrc===s?' selected':'')+'>'+s+'</option>';});
      h+='</select>';
      if(rSrc==='block-output'){
        h+='<select onchange="setCondRef('+bi+',0,\'right\',this.value)" style="width:auto;font-size:10px"><option value="">--选择节点字段--</option>';
        h+=_condRefOptions(n,rv.content);
        h+='</select>';
      }else if(rIsRef){
        h+='<input value="'+ext(rv.content?.name||(rv.content?.path||[])[0]||'')+'" placeholder="字段/变量名" onchange="setCondRef('+bi+',0,\'right\',this.value)" style="width:80px;font-size:10px">';
      }else{
        h+='<input value="'+ext(rv.content)+'" placeholder="字面量" onchange="setCondLit('+bi+',0,\'right\',this.value)" style="width:80px;font-size:10px">';
        h+='<select onchange="setCondType('+bi+',0,\'right\',this.value)" style="width:auto;font-size:10px">'+IO_TYPES.map(t=>'<option value='+t+(lc.right?.input?.type===t?' selected':'')+'>'+t+'</option>').join('')+'</select>';
      }
      }
      h+='</div>';
    });
    h+='<button onclick="addBranch()">+ 分支</button>';
  }
  p.innerHTML=h;
  }catch(e){p.innerHTML='<span style="color:#e06c75">⚠️ 属性面板出错: '+e.message+'</span>';console.error(e);}
}

// 批处理配置区
function renderBatchConfig(n){
  if(!n.data.inputs)n.data.inputs={};

  h+='<label>数组源 (blockID.name) <input value="'+ext(b.input?.value?.content?.blockID)+'.'+ext(b.input?.value?.content?.name)+'" onchange="setBatchSource(this.value)" placeholder="节点ID.字段名"></label>';
  // item 类型
  h+=`<label>item 类型 <select onchange="setBatch('itemType',this.value)">${IO_TYPES.map(x=>`<option value="${x}" ${b.itemType===x?'selected':''}>${x}</option>`).join('')}</select></label>`;
  if(b.itemType==='object'){

  }
  // 筛选条件（多条件 + AND/OR）
  const filt=b.filter||(b.filter={logic:2,conditions:[]});
  if(!filt.conditions.length)filt.conditions.push({operator:14,left:{input:{type:'integer',value:{type:'ref',content:{source:'block-output',blockID:'__batch_output__',name:''}}}},right:{input:{type:'integer',value:{type:'literal',content:''}}}});
  const n0=findN(selNode);
  // 筛选左值 = 节点原始输出字段（启用批处理前的输出，或 nth_output.schema 反映的结构）
  const nthO=(nodeOutputs(n0)||[]).find(o=>o.name==='nth_output');

  const outFields0=[];
  origOuts.forEach(o=>{outFields0.push(o.name);if(o.type==='object'&&Array.isArray(o.schema)){o.schema.forEach(sf=>outFields0.push(o.name+'.'+sf.name));}});
  h+='<h3 style="margin-top:8px">筛选条件 (filtered_outputs) <select onchange="setBatchLogic(parseInt(this.value))" style="width:auto;font-size:10px"><option value="2"'+(filt.logic!==1?' selected':'')+'>AND</option><option value="1"'+(filt.logic===1?' selected':'')+'>OR</option></select></h3>';
  filt.conditions.forEach((c,ci)=>{
    const isUnary=[9,10,11,12].includes(c.operator);
    const rv=c.right?.input?.value||{};
    const rIsRef=rv.type==='ref';
    const lName=c.left?.input?.value?.content?.name||'';
    h+='<div style="display:flex;gap:2px;margin:2px 0;flex-wrap:wrap;align-items:center">';
    h+='<select onchange="setBatchCondIdx('+ci+',\'left\',this.value)" style="width:90px;font-size:10px"><option value="">--字段--</option>'+outFields0.map(fn=>'<option value="'+fn+'"'+(lName===fn?' selected':'')+'>'+fn+'</option>').join('')+'</select>';
    h+='<select onchange="setBatchCondIdx('+ci+',\'op\',parseInt(this.value))" style="width:45px;font-size:10px">'+OPERATORS.map(o=>'<option value='+o.v+(c.operator===o.v?' selected':'')+'>'+o.t+'</option>').join('')+'</select>';
    if(!isUnary){
      h+='<select onchange="setBatchCondSrc('+ci+',this.value)" style="width:auto;font-size:10px"><option value="literal"'+(!rIsRef?' selected':'')+'>literal</option><option value="ref"'+(rIsRef?' selected':'')+'>ref</option></select>';
      if(rIsRef)h+='<input value="'+ext(rv.content?.name||'')+'" placeholder="字段名" onchange="setBatchCondIdx('+ci+',\'refName\',this.value)" style="width:60px;font-size:10px">';
      else{h+='<input value="'+ext(rv.content)+'" placeholder="值" onchange="setBatchCondIdx('+ci+',\'right\',this.value)" style="width:60px;font-size:10px">';h+='<select onchange="setBatchCondIdx('+ci+',\'type\',this.value)" style="width:auto;font-size:10px">'+IO_TYPES.map(t=>'<option value='+t+(c.right?.input?.type===t?' selected':'')+'>'+t+'</option>').join('')+'</select>';}
    }

  });
  h+='<button onclick="addBatchCond()">+ 条件</button> ';
  // nth
  h+='<label>nth（取 filtered 第几个；负/越界取最后）<input type="number" value="'+ext(b.nth,0)+'" onchange="setBatch(\'nth\',parseInt(this.value)||0)"></label>';
  h+='<div style="font-size:10px;color:#8a9099">输入字段"源"可选：节点输出 / item(整个) / item.字段 / index。</div>';

}
function setBatch(k,v){
  const n=findN(selNode);n.data.inputs.batch=n.data.inputs.batch||{};n.data.inputs.batch[k]=v;
  // 启用批处理：自动把节点输出换成 all/filtered/nth（备份原输出）；取消时还原
  if(k==='enabled'){
    if(v){
      if(!n.data.inputs.batch._origOutputs)n.data.inputs.batch._origOutputs=JSON.parse(JSON.stringify(nodeOutputs(n)));
      // nth_output 结构 = 节点原输出字段（执行器每轮产出原输出 dict，nth_output=filtered中一个dict）
      const orig=n.data.inputs.batch._origOutputs;
      const nthSchema=orig.map(o=>({name:o.name,type:o.type||'string',...(o.schema?{schema:o.schema}:{})}));
      n.data.outputs=[
        {name:'all_outputs',type:'list',schema:nthSchema.length?nthSchema:undefined,description:'所有结果'},
        {name:'filtered_outputs',type:'list',schema:nthSchema.length?nthSchema:undefined,description:'筛选结果'},
        {name:'nth_output',type:'object',schema:nthSchema.length?nthSchema:undefined,description:'第n个结果'}];
    }else if(n.data.inputs.batch._origOutputs){
      n.data.outputs=n.data.inputs.batch._origOutputs;
      delete n.data.inputs.batch._origOutputs;
    }
    showProps();renderAll();return;
  }
  showProps();
}
// 复合节点 nth_output 字段管理（all/filtered 自动同步 schema）
function _nthOut(){const n=findN(selNode);return nodeOutputs(n).find(o=>o.name==='nth_output');}
function _syncListSchema(){const n=findN(selNode);const nth=_nthOut();if(!nth)return;(nodeOutputs(n)||[]).forEach(o=>{if(o.name==='all_outputs'||o.name==='filtered_outputs'){o.type='list';o.schema=nth.schema?[...nth.schema]:{type:nth.type};}});}
function setNthType(v){const nth=_nthOut();if(!nth)return;nth.type=v;if(v==='object'&&!Array.isArray(nth.schema))nth.schema=[];else if(v!=='object')delete nth.schema;_syncListSchema();showProps();renderAll();}
function delNthSubField(si){const nth=_nthOut();if(!nth)return;nth.schema.splice(si,1);_syncListSchema();showProps();}
function setNthSubField(si,field,v){const nth=_nthOut();if(!nth)return;nth.schema[si][field]=v;_syncListSchema();showProps();}
function _batchFilt(){const n=findN(selNode);n.data.inputs.batch=n.data.inputs.batch||{};if(!n.data.inputs.batch.filter)n.data.inputs.batch.filter={logic:2,conditions:[]};return n.data.inputs.batch.filter;}
function setBatchLogic(v){_batchFilt().logic=v;showProps();}
function setBatchCondIdx(ci,field,v){const f=_batchFilt();const c=f.conditions[ci];if(field==='op')c.operator=v;if(field==='left'){c.left.input.value.content.name=v;c.left.input.value.content.blockID='__batch_output__';}if(field==='right')c.right.input.value.content=v;if(field==='type'){c.left.input.type=v;c.right.input.type=v;}if(field==='refName'){c.right.input.value={type:'ref',content:{source:'block-output',blockID:'',name:v}};}}
function setBatchCondSrc(ci,src){const f=_batchFilt();const c=f.conditions[ci];if(src==='literal')c.right.input.value={type:'literal',content:''};else c.right.input.value={type:'ref',content:{source:'block-output',blockID:'',name:''}};showProps();}
function addBatchCond(){const f=_batchFilt();f.conditions.push({operator:1,left:{input:{type:'string',value:{type:'ref',content:{source:'block-output',blockID:'__batch_output__',name:''}}}},right:{input:{type:'string',value:{type:'literal',content:''}}}});showProps();}
function delBatchCond(ci){const f=_batchFilt();f.conditions.splice(ci,1);showProps();}
function setBatchSource(s){
  const n=findN(selNode);const b=n.data.inputs.batch;
  const[bid,name]=(s||'.').split('.');b.input={type:'list',value:{type:'ref',content:{source:'block-output',blockID:bid||'',name:name||''}}};showProps();
}
function setBatchCond(side,v){
  const n=findN(selNode);const c=n.data.inputs.batch.filter.conditions[0];
  if(side==='op')c.operator=v;
  if(side==='left'){c.left.input.value.content.name=v;c.left.input.value.content.blockID='__batch_output__';}
  if(side==='right')c.right.input.value.content=v;
}
function setInputRef(i,val){
  if(!val){setInputSource(i,'literal');return;}
  // val = "节点id.字段路径"，字段路径可含点号（output.slideshow.author）→ 只按第一个点切
  const dot=val.indexOf('.');
  const bid=val.slice(0,dot), name=val.slice(dot+1);
  const n=findN(selNode);const p=nodeInputs(n)[i];if(!p)return;
  const on=findN(bid);
  const of=(on?_outFieldOptions(on):[]).find(x=>x.path===name);
  p.input.value={type:'ref',content:{source:'block-output',blockID:bid,name}};
  if(of)p.input.type=of.type||'string';
  showProps();renderAll();
}
function setInputLitVal(i,v){const n=findN(selNode);setInputLiteral(n.id,i,{type:'literal',content:v});}
function setInputSource(i,src){
  const n=findN(selNode);const p=nodeInputs(n)[i];if(!p)return;
  if(src==='node')p.input.value={type:'ref',content:{source:'block-output',blockID:'',name:''}};
  else if(src==='item')p.input.value={type:'ref',content:{source:'loop-item',name:''}};
  else if(src==='index')p.input.value={type:'ref',content:{source:'loop-index'}};
  else if(src.startsWith('item.'))p.input.value={type:'ref',content:{source:'loop-item',name:src.slice(5)}};
  else if(src==='global')p.input.value={type:'ref',content:{source:'global_variable_app',path:['']}};
  else if(src==='local')p.input.value={type:'ref',content:{source:'block-output',blockID:'',name:''}};
  else if(src==='literal')p.input.value={type:'literal',content:''};
  showProps();renderAll();
}

      }

      if(itemT==='object') h+=renderObjectSubFields(f,kind,i,'list-item');

function renderObjectSubFields(f,kind,fi,ctx){
  let schema;
  if(ctx==='list-item'){schema=f.input?.schema||f.schema; if(Array.isArray(schema)){} else {schema=[];}}
  else {schema=f.schema||f.input?.schema||[];}
  if(!Array.isArray(schema))schema=[];
  const path=(ctx==='list-item'?'i':'f')+fi;
  let h=`<tr><td colspan="3" class="sub-fields"><div style="font-size:10px;color:#8a9099">子字段: <button onclick="importFieldSchema('${kind}','${path}')" title="粘贴JSON对象，自动推断子字段结构（覆盖现有）" style="font-size:9px">📋 导入</button></div>`;
  h+=renderSchemaFields(schema,kind,path,0);
  h+='</td></tr>';
  return h;
}
// 递归渲染 schema 字段数组（支持 object 套 object / list 的 item 为 object，任意深度）
// path 定位当前 schema 数组：首段 f<idx>=object字段 / i<idx>=list的item；后续 o<idx>=object子字段 / l<idx>=list子字段的item
// 深度递进背景色：嵌套越深越亮，层级一眼可辨
const DEPTH_STYLES=[
  {bg:'transparent',bd:'#0f3460'},
  {bg:'#142040',bd:'#2a4a8a'},
  {bg:'#1a2a52',bd:'#3a5a9e'},
  {bg:'#203464',bd:'#4a6ab2'},
  {bg:'#263e76',bd:'#5a7ac6'},
  {bg:'#2c4888',bd:'#6a8ada'},
  {bg:'#32529a',bd:'#7a9aee'},
  {bg:'#385cac',bd:'#8aaaf2'},
  {bg:'#3e66be',bd:'#9abaf6'},
  {bg:'#4470d0',bd:'#aacafa'},
  {bg:'#4a7ae2',bd:'#badaff'},
];
function renderSchemaFields(schema,kind,path,depth){
  if(depth>10)return '';
  const ds=DEPTH_STYLES[depth]||DEPTH_STYLES[DEPTH_STYLES.length-1];
  let h=depth?`<div style="margin-left:6px;border-left:2px solid ${ds.bd};padding:3px 4px 3px 5px;background:${ds.bg};border-radius:4px">`:'<div>';
  schema.forEach((s,si)=>{
    const st=s.type||'string';
    h+=`<div style="display:flex;gap:2px;margin:1px 0">
      <input value="${ext(s.name)}" placeholder="名" style="width:50px;font-size:10px" onchange="setSubFieldP('${kind}','${path}',${si},'name',this.value)">
      <select style="width:55px;font-size:10px" onchange="setSubFieldP('${kind}','${path}',${si},'type',this.value)">${IO_TYPES.map(x=>`<option value="${x}" ${st===x?'selected':''}>${x}</option>`).join('')}</select>
      <button class="del" onclick="delSubFieldP('${kind}','${path}',${si})">×</button></div>`;
    h+=`<input value="${ext(s.description)}" placeholder="描述" style="width:100%;font-size:10px;color:#8a9099;margin-bottom:1px" onchange="setSubFieldP('${kind}','${path}',${si},'description',this.value)">`;
    h+=`<label style="font-size:9px;color:#8a9099;display:inline-flex;align-items:center;gap:2px"><input type="checkbox" ${s.required?'checked':''} onchange="setSubFieldP('${kind}','${path}',${si},'required',this.checked)"> required</label>`;
    // 子字段还是 object → 递归渲染其子字段
    if(st==='object'){
      h+=`<div style="font-size:9px;color:#61afef;margin:2px 0 1px 2px">└ object 子字段: <button onclick="importFieldSchema('${kind}','${path}/o${si}')" title="粘贴JSON对象，自动推断该字段的子字段结构（覆盖现有）" style="font-size:9px">📋 导入</button></div>`;
      h+=renderSchemaFields(Array.isArray(s.schema)?s.schema:[],kind,path+'/o'+si,depth+1);
    }
    // 子字段是 list → item 类型；item 为 object → 递归渲染 item 字段
    if(st==='list'){
      const itemT=getListItemType(s);
      h+=`<div style="margin:2px 0 1px 2px;font-size:9px;color:#98c379">└ item 类型: <select style="width:auto;font-size:10px" onchange="setSubItemTypeP('${kind}','${path}',${si},this.value)">${IO_TYPES.map(x=>`<option value="${x}" ${itemT===x?'selected':''}>${x}</option>`).join('')}</select></div>`;
      if(itemT==='object'){
        h+=`<div style="font-size:9px;color:#61afef;margin:1px 0 1px 10px">└ item 字段: <button onclick="importFieldSchema('${kind}','${path}/l${si}')" title="粘贴JSON对象，自动推断 item 字段结构（覆盖现有）" style="font-size:9px">📋 导入</button></div>`;
        h+=renderSchemaFields(Array.isArray(s.schema)?s.schema:[],kind,path+'/l'+si,depth+1);
      }
    }
  });
  h+=`<button onclick="addSubFieldP('${kind}','${path}')" style="font-size:10px">+ 子字段</button></div>`;
  return h;
}
function getListItemType(f){
  const sch=f.input?.schema||f.schema;
  if(Array.isArray(sch))return 'object';
  if(sch&&sch.type)return sch.type;

  if(v===null||v===undefined) return 'string';
  if(typeof v==='number') return Number.isInteger(v)?'integer':'number';

  if(Array.isArray(v)) return 'list';

// 数组取所有 object 元素的字段并集（如 slides[1] 才有的 items 也能推断出来），同名字段以先出现的值定类型
function _inferFields(obj){
  return Object.entries(obj).map(([k,v])=>{
    const f={name:k,type:_inferType(v),description:'',required:false};
    if(Array.isArray(v)){
      const objs=v.filter(e=>e&&typeof e==='object'&&!Array.isArray(e));
      if(objs.length){
        const merged={};
        objs.forEach(o=>Object.entries(o).forEach(([kk,vv])=>{if(!(kk in merged))merged[kk]=vv;}));
        f.schema=_inferFields(merged);
      }
      else if(v.length&&v[0]!==undefined) f.schema={type:_inferType(v[0])};
    }else if(v!==null&&typeof v==='object'){
      f.schema=_inferFields(v);
    }
    return f;
  });
}

// 规范化标记节点 ID 并同步更新所有引用（edges + 各节点 input 里的 blockID）
function _normMarkerId(blocks,edges,node,newId){
  const oldId=node.id;
  if(oldId===newId)return;
  edges.forEach(e=>{
    if(e.sourceNodeID===oldId)e.sourceNodeID=newId;
    if(e.targetNodeID===oldId)e.targetNodeID=newId;
  });
  blocks.forEach(b=>{
    const walk=(o)=>{
      if(!o||typeof o!=='object')return;
      if(o.blockID===oldId)o.blockID=newId;
      if(Array.isArray(o))o.forEach(walk);
      else Object.values(o).forEach(walk);
    };
    walk(b.data);
  });
  node.id=newId;
}
// 同步迭代入口节点的输出：item(带schema)/index/本地变量/复合节点其它输入
function _syncEntryOutputs(n,entryNode){
  const inList=n.data.inputs?.inputParameters?.find(p=>p.input?.type==='list');
  const varNames=(n.data.inputs?.variableParameters||[]).map(v=>v.name);
  const outs=[];
  if(inList){
    const inSchema=inList?.input?.schema;
    let itemType='string', itemObjSchema=null;
    if(Array.isArray(inSchema)){itemType='object';itemObjSchema=inSchema;}
    else if(inSchema&&inSchema.type){itemType=inSchema.type;if(inSchema.type==='object'&&inSchema.fields)itemObjSchema=inSchema.fields;}
    outs.push({name:'item',type:itemType,description:'当前元素(整个item)',schema:itemObjSchema||undefined});
  }
  outs.push({name:'index',type:'integer',description:'当前索引(0起)'});
  varNames.forEach(vn=>{outs.push({name:vn,type:'string',description:'本地变量(可被置变量修改)'});});
  // 复合节点的其它输入字段也暴露给 body
  (n.data.inputs?.inputParameters||[]).forEach(p=>{
    if(p.input?.type!=='list'&&p.name&&!['item','index'].includes(p.name))
      outs.push({name:p.name,type:p.input?.type||'string',description:'复合节点输入'});
  });
  entryNode.data.outputs=outs;
}
