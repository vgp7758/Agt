<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>工作流编辑器 — Agt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font:13px/1.5 system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:8px;padding:7px 12px;background:#16213e;border-bottom:1px solid #0f3460;flex-wrap:wrap}
#topbar select,#topbar input,#topbar button{background:#0f3460;color:#e0e0e0;border:1px solid #533483;border-radius:4px;padding:4px 8px;font-size:12px}
#topbar button{cursor:pointer;background:#533483;border-color:#7b2ff7}
#topbar button:hover{background:#7b2ff7}
#topbar button.danger{background:#6b2020;border-color:#a33}
#topbar button.danger:hover{background:#a33}
#main{display:flex;flex:1;overflow:hidden}
/* 左：调色板 */
#palette{width:170px;background:#16213e;border-right:1px solid #0f3460;padding:6px;overflow-y:auto}
#palette h3{font-size:11px;color:#8a9099;margin:6px 0 3px;text-transform:uppercase}
.pal-item{display:block;width:100%;text-align:left;padding:5px 7px;margin:2px 0;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:#fff}
.pal-item.flow{background:#1a5c2a}.pal-item.llm{background:#1a3a6b}.pal-item.code{background:#3a1a6b}
.pal-item.branch{background:#6b3a1a}.pal-item.composite{background:#1a6b6b}
.pal-item.data{background:#4a4a1a}.pal-item.ext{background:#4a1a4a}
/* 中：画布 */
#canvasWrap{flex:1;background:#1a1a2e;overflow:auto;position:relative;cursor:grab}
#canvasWrap:active{cursor:grabbing}
#svgCanvas{width:3000px;height:2200px;display:block}
.grid-line{stroke:#ffffff08}
.node-body{fill:#16213e;stroke:#533483;stroke-width:1.5}
.node-body.sel{stroke:#7b2ff7;stroke-width:2.5;filter:drop-shadow(0 0 6px #7b2ff755)}
.node-header-rect{rx:4}
.node-title{fill:#fff;font-size:12px;font-weight:600;pointer-events:none}
.node-type-tag{fill:#8a9099;font-size:9px;pointer-events:none}
.node-field-name{font-size:10px;dominant-baseline:middle;pointer-events:none}
.expand-toggle{font-size:11px;cursor:pointer;user-select:none;dominant-baseline:middle}
.sub-row{font-size:9px;dominant-baseline:middle;pointer-events:none}
/* 流程端口（标题栏左右） */
.port-flow{fill:#fff;stroke:#533483;stroke-width:1.5;cursor:crosshair}
.port-flow:hover{fill:#7b2ff7;stroke:#fff;r:7}
/* 变量端口 */
.port-var{stroke-width:1.5;cursor:crosshair}
.port-var:hover{stroke:#fff}
/* 流程线（白实线） */
.edge-flow{stroke:#fff;stroke-width:2;fill:none;marker-end:url(#arrowFlow)}
.edge-flow.sel{stroke:#7b2ff7;stroke-width:3}
/* 变量线（彩色虚线） */
.edge-var{stroke-width:1.8;fill:none;stroke-dasharray:6 4;marker-end:url(#arrowVar)}
.edge-var.sel{stroke-width:2.8}
.edge-ghost{stroke:#7b2ff7;stroke-width:1.5;stroke-dasharray:5 4;fill:none;pointer-events:none}
.edge-label{fill:#bbb;font-size:9px;pointer-events:none}
/* 右：属性面板 */
#props{width:330px;background:#16213e;border-left:1px solid #0f3460;overflow-y:auto;padding:10px}
#props h3{font-size:12px;color:#8a9099;margin:10px 0 3px;border-bottom:1px solid #0f3460;padding-bottom:3px}
#props label{display:block;font-size:11px;color:#8a9099;margin-top:5px}
#props input,#props select,#props textarea{width:100%;background:#0f3460;color:#e0e0e0;border:1px solid #533483;border-radius:3px;padding:3px 5px;font-size:12px;margin-top:1px}
#props textarea{resize:vertical;font-family:monospace;min-height:50px}
#props button{background:#533483;color:#fff;border:none;border-radius:3px;padding:3px 7px;font-size:11px;cursor:pointer;margin:3px 2px}
#props button:hover{background:#7b2ff7}
#props button.del{background:#6b2020;padding:2px 6px}
#props button.del:hover{background:#a33}
.io-table{width:100%;border-collapse:collapse;font-size:11px}
.io-table td{padding:1px;vertical-align:top}
.io-table input,.io-table select{width:100%;font-size:11px;padding:2px 3px;margin:0}
.sub-fields{margin-left:10px;border-left:2px solid #0f3460;padding-left:6px;margin-top:2px}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#533483;color:#fff;padding:8px 20px;border-radius:6px;z-index:999;transition:opacity .3s;pointer-events:none}
.legend{font-size:10px;color:#8a9099;line-height:1.7}
.swatch{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}
</style>
</head>
<body>
<div id="topbar">
  <select id="fileSel"><option value="">选择工作流…</option></select>
  <button onclick="WE.createWf()">➕ 新建</button>
  <button onclick="WE.saveWf()">💾 保存</button>
  <button class="danger" onclick="WE.deleteWf()">🗑 删除</button>
  <input id="fdesc" placeholder="描述" style="flex:1;min-width:120px">
  <input id="fcoze" placeholder="Coze URL（可选）" style="width:220px">
  <span style="color:#8a9099;font-size:11px" id="fstatus"></span>
</div>
<div id="main">
  <div id="palette">
    <h3>基本</h3>
    <button class="pal-item flow" data-type="1">▶ 开始</button>
    <button class="pal-item flow" data-type="2">◼ 结束</button>
    <h3>AI</h3>
    <button class="pal-item llm" data-type="3">🤖 LLM</button>
    <button class="pal-item llm" data-type="22">🎯 意图识别</button>
    <h3>逻辑</h3>
    <button class="pal-item branch" data-type="8">🔀 选择器</button>
    <button class="pal-item composite" data-type="21">🔄 循环</button>
    <button class="pal-item composite" data-type="28">📦 批处理</button>
    <h3>处理</h3>
    <button class="pal-item code" data-type="5">📝 代码</button>
    <button class="pal-item data" data-type="15">📄 文本</button>
    <button class="pal-item data" data-type="58">{→} ToJSON</button>
    <button class="pal-item data" data-type="59">{←} FromJSON</button>
    <h3>变量</h3>
    <button class="pal-item data" data-type="32">🧲 聚合</button>
    <button class="pal-item data" data-type="40">✏ 赋值</button>
    <h3>外部</h3>
    <button class="pal-item ext" data-type="45">🌐 HTTP</button>
    <button class="pal-item ext" data-type="9">🔗 子工作流</button>
    <button class="pal-item ext" data-type="13">💬 输出</button>
    <h3>Agent 工具</h3>
    <div id="toolPalette" style="font-size:10px;color:#8a9099">加载中…</div>
    <input id="toolFilter" placeholder="🔍 过滤工具…" style="width:100%;margin-top:4px;font-size:11px;background:#0f3460;color:#fff;border:1px solid #533483;border-radius:3px;padding:3px">
    <h3>图例</h3>
    <div class="legend" id="legend"></div>
  </div>
  <div id="canvasWrap"><svg id="svgCanvas"></svg></div>
  <div id="props"><div id="propsContent" style="color:#8a9099">← 点击节点编辑属性</div></div>
</div>
<div id="toast" style="opacity:0"></div>

<script>
// ============ 常量 ============
const TYPE_LABEL={1:'Entry',2:'Exit',3:'LLM',5:'Code',8:'Selector',9:'SubWorkflow',4:'Plugin',13:'Output',15:'Text',21:'Loop',22:'Intent',28:'Batch',32:'Aggregator',40:'Assigner',45:'HTTP',58:'ToJSON',59:'FromJSON'};
const TYPE_CATEGORY={1:'flow',2:'flow',3:'llm',5:'code',8:'branch',9:'ext',4:'ext',13:'ext',15:'data',21:'composite',22:'llm',28:'composite',32:'data',40:'data',45:'ext',58:'data',59:'data'};
const HDR_COLOR={flow:'#1a5c2a',llm:'#1a3a6b',code:'#3a1a6b',branch:'#6b3a1a',composite:'#1a6b6b',data:'#4a4a1a',ext:'#4a1a4a'};
const IO_TYPES=['string','integer','float','number','boolean','object','list','file','time'];
// 变量类型颜色
const TYPE_COLOR={string:'#e6c07b',integer:'#56b6c2',float:'#56b6c2',number:'#56b6c2',boolean:'#c678dd',object:'#61afef',list:'#98c379',file:'#e06c75',time:'#d19a66'};
const OPERATORS=[{v:1,t:'='},{v:2,t:'≠'},{v:7,t:'包含'},{v:8,t:'不含'},{v:9,t:'为空'},{v:10,t:'非空'},{v:13,t:'>'},{v:14,t:'≥'},{v:15,t:'<'},{v:16,t:'≤'}];

const NS='http://www.w3.org/2000/svg';
const svg=document.getElementById('svgCanvas');

let WF={name:'',nodes:[],edges:[],meta:{name:'',description:'',enabled:true,coze_url:''}};
let selNode=null,selEdge=null;     // selEdge: {kind:'flow',i} 或 {kind:'var',tgtNode,tgtField}
let dragNode=null,dragDX=0,dragDY=0;
let edgeFrom=null;                 // {kind:'flow'|'var', nodeId, port, x, y, color}
let panning=false,panX=0,panY=0,panStartX=0,panStartY=0;
let expandedFields=new Set();      // 展开的 object 字段键: "nodeId::fieldName::in|out"
let _pendingHandles=[];            // 连线断开 handle（延后到节点之上绘制）

// ============ 工具 ============
function elm(tag,attrs={},text){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs))e.setAttribute(k,v);
  if(text!=null)e.textContent=text;
  return e;
}
function ext(s,d=''){return s!=null?s:d;}
function genId(){return ''+(Date.now()%1000000+Math.floor(Math.random()*900000));}
function findN(id){return WF.nodes.find(n=>n.id===id);}
function nodeTitle(n){return n.data.nodeMeta?.title||TYPE_LABEL[n.type]||('节点'+n.type);}
function nodeInputs(n){return n.data.inputs?.inputParameters||[];}
function nodeOutputs(n){return n.data.outputs||[];}
// 输入字段是否已连变量线（ref 且 block-output）
function inputIsLinked(p){
  const v=p.input?.value; return v&&v.type==='ref'&&v.content?.source==='block-output'&&v.content?.blockID;
}
function inputRefSource(p){const v=p.input?.value;return v?.content;}
// 类型颜色（list 取 item 颜色？统一用字段本身 type 颜色）
function fieldColor(type){return TYPE_COLOR[type]||'#aaa';}

// ============ 端口行布局（支持 object 字段展开）============
const HDR_H=26, ROW_H=18, PAD=8;

// 为节点计算"行"列表：每行 = 一个可连线端口。
// 输入在左侧、输出在右侧，共用行索引（各自独立计数）。
// 行: {side:'in'|'out', field:字段名(子字段用 父.子), type, parent:父字段名|null, sub:boolean}
function nodeRows(n){
  const rows=[];
  const ins=nodeInputs(n), outs=nodeOutputs(n);
  for(let i=0;i<Math.max(ins.length,outs.length);i++){
    if(ins[i]) rows.push(...fieldRows(n.id, ins[i],'in'));
    if(outs[i]) rows.push(...fieldRows(n.id, outs[i],'out'));
  }
  return rows;
}
function fieldRows(nodeId, f, side){
  const type=side==='in'?(f.input?.type||'string'):(f.type||'string');
  const name=f.name;
  const key=nodeId+'::'+name+'::'+side;
  const rows=[{side,field:name,type,parent:null,sub:false,key}];
  if(type==='object' && expandedFields.has(key)){
    const schema=side==='in'?(f.input?.schema):(f.schema);
    (Array.isArray(schema)?schema:[]).forEach(s=>{
      rows.push({side,field:name+'.'+s.name,type:s.type||'string',parent:name,sub:true,key:key+'::'+s.name});
    });
  }
  return rows;
}
function nodeH(n){
  const rows=nodeRows(n);
  const inRows=rows.filter(r=>r.side==='in').length;
  const outRows=rows.filter(r=>r.side==='out').length;
  return HDR_H+Math.max(inRows,outRows)*ROW_H+PAD;
}
// 取某端口的 y（按它在所在侧的行序）
function portY(n, side, field){
  const rows=nodeRows(n).filter(r=>r.side===side);
  const i=rows.findIndex(r=>r.field===field);
  if(i<0) return n.y+HDR_H+ROW_H/2;
  return n.y+HDR_H+i*ROW_H+ROW_H/2;
}
function inPortPos(n,field){return{x:n.x, y:portY(n,'in',field)};}
function outPortPos(n,field){return{x:n.x+n.w, y:portY(n,'out',field)};}
// 流程端口（标题栏左右）
function flowOutPos(n){return{x:n.x+n.w, y:n.y+HDR_H/2};}
function flowInPos(n){return{x:n.x, y:n.y+HDR_H/2};}
function flowInPos(n){return{x:n.x, y:n.y+HDR_H/2};}

// ============ 渲染 ============
function renderAll(){
  svg.innerHTML='';
  _pendingHandles=[];
  // defs（箭头）
  const defs=elm('defs');
  defs.innerHTML=`<marker id="arrowFlow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fff"/></marker>
    <marker id="arrowVar" markerWidth="7" markerHeight="7" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="context-stroke"/></marker>`;
  svg.appendChild(defs);
  // 网格
  for(let x=0;x<3000;x+=40)svg.appendChild(elm('line',{x1:x,y1:0,x2:x,y2:2200,'class':'grid-line'}));
  for(let y=0;y<2200;y+=40)svg.appendChild(elm('line',{x1:0,y1:y,x2:3000,y2:y,'class':'grid-line'}));

  // ---- 变量线（先画，在节点下层）----
  WF.nodes.forEach(tn=>{
    nodeInputs(tn).forEach((p)=>{
      if(!inputIsLinked(p))return;
      const src=inputRefSource(p);
      const sn=findN(src.blockID); if(!sn)return;
      // 支持点号：src.name 可能是 "obj.field"
      const sp=outPortPos(sn, src.name.split('.')[0]===src.name?src.name:src.name);
      // 子字段引用：src.name="obj.f" 时，源端口画在 obj 展开后的 f 子行（若展开）或 obj 行
      const srcField = src.name;
      const tp=inPortPos(tn, p.name);
      const key=tn.id+'::'+p.name;
      const sel=selEdge&&selEdge.kind==='var'&&selEdge.key===key;
      const col=fieldColor(p.input?.type||'string');
      // 源端口位置：若 src.name 含点号且源节点展开了该 object，定位到子行；否则定位到父字段行
      let sx;
      if(src.name.includes('.')){
        const [parent,child]=src.name.split('.');
        const rows=nodeRows(sn).filter(r=>r.side==='out'&&r.field===src.name);
        sx = rows.length? {x:sn.x+sn.w, y:portY(sn,'out',src.name)} : outPortPos(sn,parent);
      }else{
        sx=outPortPos(sn,src.name);
      }
      const path=elm('path',{d:bezier(sx,tp,true),class:'edge-var'+(sel?' sel':''),stroke:col,'marker-end':'url(#arrowVar)','data-varkey':key});
      path.onclick=(e)=>{e.stopPropagation();selEdge={kind:'var',key};selNode=null;showProps();renderAll();};
      svg.appendChild(path);
      // 目标端断开 handle：延后到节点之上绘制（避免被节点遮挡）
      _pendingHandles.push({x:tp.x,y:tp.y,r:4,fill:col,stroke:'#fff',info:{kind:'var',key,tgtNode:tn.id,tgtField:p.name},sp:sx,color:col});
    });
  });

  // ---- 流程线 ----
  WF.edges.forEach((ed,i)=>{
    const sn=findN(ed.sourceNodeID),tn=findN(ed.targetNodeID); if(!sn||!tn)return;
    const sp=flowOutPos(sn), tp=flowInPos(tn);
    const sel=selEdge&&selEdge.kind==='flow'&&selEdge.i===i;
    const path=elm('path',{d:bezier(sp,tp,false),class:'edge-flow'+(sel?' sel':''),'data-flowi':i});
    path.onclick=(e)=>{e.stopPropagation();selEdge={kind:'flow',i};selNode=null;showProps();renderAll();};
    svg.appendChild(path);
    if(ed.sourcePortID){
      svg.appendChild(elm('text',{x:(sp.x+tp.x)/2,y:(sp.y+tp.y)/2-8,class:'edge-label','text-anchor':'middle'},ed.sourcePortID));
    }
    // 目标端断开 handle：延后绘制
    _pendingHandles.push({x:tp.x,y:tp.y,r:5,fill:'#fff',stroke:'#533483',info:{kind:'flow',i},sp:sp,color:'#fff'});
  });

  // ---- 节点 ----
  WF.nodes.forEach(n=>svg.appendChild(renderNode(n)));

  // ---- 连线断开 handle（最上层，避免被节点遮挡）----
  _pendingHandles.forEach(h=>{
    const handle=elm('circle',{cx:h.x,cy:h.y,r:h.r,fill:h.fill,stroke:h.stroke,'stroke-width':1.5,class:'edge-handle',style:'cursor:grab'});
    handle.onmousedown=(e)=>{e.stopPropagation();startDisconnect(h.info,h.sp,h.color);};
    svg.appendChild(handle);
  });

  // ---- 拖拽临时线 ----
  if(edgeFrom){
    const sx=edgeFrom.sp?edgeFrom.sp.x:edgeFrom.x, sy=edgeFrom.sp?edgeFrom.sp.y:edgeFrom.y;
    svg.appendChild(elm('path',{d:bezier({x:sx,y:sy},{x:edgeFrom.mx,y:edgeFrom.my},edgeFrom.kind!=='flow'),class:'edge-ghost',stroke:edgeFrom.color||'#7b2ff7'}));
  }
}

function bezier(sp,tp,isVar){
  const dx=Math.abs(tp.x-sp.x);
  const c1x=sp.x+dx*0.5, c2x=tp.x-dx*0.5;
  return `M${sp.x},${sp.y} C${c1x},${sp.y} ${c2x},${tp.y} ${tp.x},${tp.y}`;
}

function renderNode(n){
  const g=elm('g',{transform:`translate(${n.x},${n.y})`,'data-id':n.id});
  n.h=nodeH(n);
  const cat=TYPE_CATEGORY[n.type]||'llm';
  // 体
  g.appendChild(elm('rect',{x:0,y:0,width:n.w,height:n.h,class:'node-body'+(selNode===n.id?' sel':'')}));
  // 标题栏
  g.appendChild(elm('rect',{x:0,y:0,width:n.w,height:HDR_H,fill:HDR_COLOR[cat]||'#533483',rx:4,'class':'node-header-rect'}));
  g.appendChild(elm('text',{x:n.w/2,y:11,class:'node-title','text-anchor':'middle'},nodeTitle(n)));
  g.appendChild(elm('text',{x:n.w/2,y:21,class:'node-type-tag','text-anchor':'middle'},TYPE_LABEL[n.type]+' · '+n.type));
  // 流程端口（标题栏左右）
  const fIn=elm('circle',{cx:0,cy:HDR_H/2,r:6,class:'port-flow',title:'流程入口'});
  fIn.onmouseup=(e)=>{e.stopPropagation();finishFlow(n.id);};
  g.appendChild(fIn);
  const fOut=elm('circle',{cx:n.w,cy:HDR_H/2,r:6,class:'port-flow',title:'流程出口'});
  fOut.onmousedown=(e)=>{e.stopPropagation();startFlow(n.id);};
  g.appendChild(fOut);

  // 变量端口（按 nodeRows 行渲染；object 字段可展开成子端口）
  const rows=nodeRows(n);
  const inRows=rows.filter(r=>r.side==='in'), outRows=rows.filter(r=>r.side==='out');
  const maxRows=Math.max(inRows.length,outRows.length);
  for(let ri=0;ri<maxRows;ri++){
    const ir=inRows[ri], or=outRows[ri];
    // ---- 输入侧 ----
    if(ir){
      const y=HDR_H+ri*ROW_H+ROW_H/2;
      const col=fieldColor(ir.type);
      if(!ir.sub){
        // 顶层字段端口
        const port=elm('circle',{cx:0,cy:y,r:5,class:'port-var',fill:col,stroke:col});
        port.onmouseup=(e)=>{e.stopPropagation();finishVar(n.id,ir.field,col);};
        port.onmousedown=(e)=>{e.stopPropagation();};
        g.appendChild(port);
        // object 展开标记
        if(ir.type==='object'){
          const exp=expandedFields.has(ir.key);
          const tg=elm('text',{x:8,y,class:'expand-toggle',fill:col},exp?'▾':'▸');
          tg.onclick=(e)=>{e.stopPropagation();toggleExpand(ir.key);};
          g.appendChild(tg);
          g.appendChild(elm('text',{x:22,y,class:'node-field-name',fill:col},ir.field));
        }else{
          g.appendChild(elm('text',{x:10,y,class:'node-field-name',fill:col},ir.field));
          // 未连线控件
          const p=nodeInputs(n).find(x=>x.name===ir.field);
          if(p&&!inputIsLinked(p)){
            const fo=makeInputControl(n,p,nodeInputs(n).indexOf(p));
            if(fo){fo.setAttribute('x',n.w-90);fo.setAttribute('y',y-8);fo.setAttribute('width',80);fo.setAttribute('height',16);g.appendChild(fo);}
          }
        }
      }else{
        // 子字段端口（缩进）
        const port=elm('circle',{cx:0,cy:y,r:4,class:'port-var',fill:col,stroke:col});
        port.onmouseup=(e)=>{e.stopPropagation();finishVar(n.id,ir.field,col);};
        port.onmousedown=(e)=>{e.stopPropagation();};
        g.appendChild(port);
        g.appendChild(elm('text',{x:10,y,class:'sub-row',fill:col},ir.field.split('.').pop()));
      }
    }
    // ---- 输出侧 ----
    if(or){
      const y=HDR_H+ri*ROW_H+ROW_H/2;
      const col=fieldColor(or.type);
      if(!or.sub){
        const port=elm('circle',{cx:n.w,cy:y,r:5,class:'port-var',fill:col,stroke:col});
        port.onmousedown=(e)=>{e.stopPropagation();startVar(n.id,or.field,col,n.x+n.w,n.y+y);};
        g.appendChild(port);
        if(or.type==='object'){
          const exp=expandedFields.has(or.key);
          const tg=elm('text',{x:n.w-22,y,class:'expand-toggle',fill:col},exp?'▾':'▸');
          tg.onclick=(e)=>{e.stopPropagation();toggleExpand(or.key);};
          g.appendChild(tg);
          g.appendChild(elm('text',{x:n.w-32,y,class:'node-field-name','text-anchor':'end',fill:col},or.field));
        }else{
          g.appendChild(elm('text',{x:n.w-10,y,class:'node-field-name','text-anchor':'end',fill:col},or.field));
        }
      }else{
        const port=elm('circle',{cx:n.w,cy:y,r:4,class:'port-var',fill:col,stroke:col});
        port.onmousedown=(e)=>{e.stopPropagation();startVar(n.id,or.field,col,n.x+n.w,n.y+y);};
        g.appendChild(port);
        g.appendChild(elm('text',{x:n.w-10,y,class:'sub-row','text-anchor':'end',fill:col},or.field.split('.').pop()));
      }
    }
  }

  // 选择器：分支行 + 每分支流程出口（foreignObject）
  if(n.type==='8'){
    renderSelectorBranches(g,n);
  }

  // 交互
  g.onmousedown=(e)=>{
    if(e.button!==0)return;
    if(e.target.classList.contains('port-flow')||e.target.classList.contains('port-var'))return;
    e.stopPropagation();
    dragNode=n.id; dragDX=n.x-e.clientX; dragDY=n.y-e.clientY;
    selNode=n.id; selEdge=null; showProps(); renderAll();
  };
  return g;
}

// ============ 连线交互 ============
function toggleExpand(key){if(expandedFields.has(key))expandedFields.delete(key);else expandedFields.add(key);renderAll();}
// 从目标端点拽出：松手若不在端口上则断开该线
function startDisconnect(info, sp, color){
  edgeFrom={kind:'disconnect',info,sp,mx:sp.x,my:sp.y,color};
  renderAll();
}
function doDisconnect(info){
  if(info.kind==='flow'){
    WF.edges.splice(info.i,1);
    toast('已断开流程线');
  }else if(info.kind==='var'){
    const tn=findN(info.tgtNode);
    const p=tn?.data.inputs.inputParameters.find(x=>x.name===info.tgtField);
    if(p){p.input.value={type:'literal',content:''};toast('已断开变量线');}
  }
  showProps();renderAll();
}
function startFlow(nodeId){const n=findN(nodeId);const p=flowOutPos(n);edgeFrom={kind:'flow',nodeId,x:p.x,y:p.y,mx:p.x,my:p.y,color:'#fff'};renderAll();}
function startVar(nodeId,field,color,x,y){edgeFrom={kind:'var',nodeId,field,x,y,mx:x,my:y,color};renderAll();}
function finishFlow(tgtId){
  if(!edgeFrom||edgeFrom.kind!=='flow'){edgeFrom=null;renderAll();return;}
  if(edgeFrom.nodeId===tgtId){edgeFrom=null;renderAll();return;}
  // 同源同目标（默认端口）只保留一条；分支端口可多条
  WF.edges=WF.edges.filter(e=>!(e.sourceNodeID===edgeFrom.nodeId&&e.targetNodeID===tgtId&&(!e.sourcePortID)));
  WF.edges.push({sourceNodeID:edgeFrom.nodeId,targetNodeID:tgtId,sourcePortID:''});
  edgeFrom=null;renderAll();
}
function finishVar(tgtId,field,color){
  if(!edgeFrom||edgeFrom.kind!=='var'){edgeFrom=null;renderAll();return;}
  if(edgeFrom.color!==color){edgeFrom=null;toast('类型不匹配：只能连相同颜色的端口');renderAll();return;}
  if(edgeFrom.nodeId===tgtId){edgeFrom=null;renderAll();return;}
  const tn=findN(tgtId);if(!tn){edgeFrom=null;renderAll();return;}
  // field 可能是子字段 "obj.sub" → 定位父字段 obj
  const parent=field.split('.')[0];
  const p=tn.data.inputs.inputParameters.find(x=>x.name===parent);
  if(!p){edgeFrom=null;toast('目标无匹配输入字段');renderAll();return;}
  // 源可能是子字段(点号)或整对象；name 用完整路径，执行器按点号取值
  p.input.value={type:'ref',content:{source:'block-output',blockID:edgeFrom.nodeId,name:edgeFrom.field}};
  // 若连的是子字段，把输入类型同步成子字段类型（便于下游同色校验）
  if(field.includes('.')) p.input.type=color2type(color);
  edgeFrom=null;selNode=tgtId;showProps();renderAll();
  toast('已连接：'+edgeFrom?.field||field);
}
function color2type(col){return Object.entries(TYPE_COLOR).find(([k,v])=>v===col)?.[0]||'string';}
svg.addEventListener('mousemove',(e)=>{
  if(dragNode){const n=findN(dragNode);if(n){n.x=e.clientX+dragDX;n.y=e.clientY+dragDY;renderAll();}}
  if(edgeFrom){edgeFrom.mx=e.clientX;edgeFrom.my=e.clientY;renderAll();}
  if(panning){const wrap=document.getElementById('canvasWrap');wrap.scrollLeft=panStartX-(e.clientX-panX);wrap.scrollTop=panStartY-(e.clientY-panY);}
});
svg.addEventListener('mouseup',(e)=>{
  dragNode=null;panning=false;
  // 断开拖拽：松手时若不在端口上 → 断开；落在同色端口上 → 重连到新目标
  if(edgeFrom&&edgeFrom.kind==='disconnect'){
    const onPort=e.target.classList&&(e.target.classList.contains('port-flow')||e.target.classList.contains('port-var'));
    if(!onPort){
      doDisconnect(edgeFrom.info);
    }
    // 落在端口上：保持原线（不处理重连，避免复杂；要换目标先断再连）
    edgeFrom=null;renderAll();
  }
});
svg.addEventListener('mousedown',(e)=>{
  if(e.target===svg||e.target.classList.contains('grid-line')){
    panning=true;panX=e.clientX;panY=e.clientY;
    const wrap=document.getElementById('canvasWrap');panStartX=wrap.scrollLeft;panStartY=wrap.scrollTop;
  }
});
svg.addEventListener('click',(e)=>{
  if(e.target===svg||e.target.classList.contains('grid-line')){
    selNode=null;selEdge=null;edgeFrom=null;showProps();renderAll();
  }
});
svg.addEventListener('contextmenu',(e)=>{
  e.preventDefault();
  if(selNode&&selNode!=='100001'&&selNode!=='900001'){
    WF.nodes=WF.nodes.filter(n=>n.id!==selNode);
    WF.edges=WF.edges.filter(ed=>ed.sourceNodeID!==selNode&&ed.targetNodeID!==selNode);
    // 清掉指向它的 ref
    WF.nodes.forEach(n=>nodeInputs(n).forEach(p=>{if(inputRefSource(p)?.blockID===selNode)p.input.value={type:'literal',content:''};}));
    selNode=null;showProps();renderAll();
  }
  if(selEdge&&selEdge.kind==='flow'){WF.edges.splice(selEdge.i,1);selEdge=null;renderAll();}
  if(selEdge&&selEdge.kind==='var'){
    const[tid,fname]=selEdge.key.split('::');const tn=findN(tid);
    const p=tn?.data.inputs.inputParameters.find(x=>x.name===fname);
    if(p)p.input.value={type:'literal',content:''};
    selEdge=null;renderAll();
  }
});

      lI.onchange=()=>{ensureCond(br);br.cond.conditions[0].left={input:{type:'string',value:{type:'ref',content:{source:'block-output',blockID:'',name:lI.value}}}};saveBranchCond(n,br);};
      const rI=document.createElement('input');rI.style.cssText='width:45px;font-size:9px;padding:0 2px;background:#0f3460;color:#fff;border:1px solid #533483';
      rI.value=ext(br.cond.conditions?.[0]?.right?.input?.value?.content,'');

  branchesAll.forEach((br,i)=>{

    port.onmousedown=(e)=>{e.stopPropagation();const pp={x:n.x+n.w,y:n.y+yy};edgeFrom={kind:'flow',nodeId:n.id,port:br.port,x:pp.x,y:pp.y,mx:pp.x,my:pp.y,color:'#fff'};renderAll();};
    g.appendChild(port);
    g.appendChild(elm('text',{x:n.w-10,y:yy+3,class:'node-type-tag','text-anchor':'end'},br.label));
  });

// ============ 属性面板 ============

// 批处理配置区
function renderBatchConfig(n){
  const b=n.data.inputs.batch||(n.data.inputs.batch={});
  if(b.enabled===undefined)b.enabled=false;
  let h='<h3>批处理（逐元素执行）</h3>';
  h+=`<label><input type="checkbox" ${b.enabled?'checked':''} onchange="setBatch('enabled',this.checked)" style="width:auto"> 启用批处理</label>`;
  if(!b.enabled)return h+'<div style="font-size:10px;color:#8a9099">启用后，节点对数组逐元素执行，输出 all_outputs / filtered_outputs / nth_output。</div>';
  // array 源
  h+='<label>数组源 (blockID.name) <input value="'+ext(b.input?.value?.content?.blockID)+'.'+ext(b.input?.value?.content?.name)+'" onchange="setBatchSource(this.value)" placeholder="节点ID.字段名"></label>';
  // item 类型
  h+=`<label>item 类型 <select onchange="setBatch('itemType',this.value)">${IO_TYPES.map(x=>`<option value="${x}" ${b.itemType===x?'selected':''}>${x}</option>`).join('')}</select></label>`;
  if(b.itemType==='object'){
    h+='<div style="font-size:10px;color:#8a9099">item 为 object 时，输入字段可引用 item.字段（在下方输入字段"源"选 item）。</div>';
  }
  // 筛选条件
  h+='<h3 style="margin-top:8px">筛选条件 (filtered_outputs)</h3>';
  const filt=b.filter||(b.filter={logic:2,conditions:[]});
  if(!filt.conditions.length)filt.conditions.push({operator:14,left:{input:{type:'integer',value:{type:'ref',content:{source:'block-output',blockID:'__batch_output__',name:''}}}},right:{input:{type:'integer',value:{type:'literal',content:''}}}});
  const c=filt.conditions[0];
  h+=`<div style="display:flex;gap:2px"><input value="${ext(c.left?.input?.value?.content?.name)}" placeholder="输出字段" onchange="setBatchCond('left',this.value)" style="flex:1">
    <select onchange="setBatchCond('op',parseInt(this.value))" style="width:50px">${OPERATORS.map(o=>`<option value="${o.v}" ${c.operator===o.v?'selected':''}>${o.t}</option>`).join('')}</select>
    <input value="${ext(c.right?.input?.value?.content)}" placeholder="值" onchange="setBatchCond('right',this.value)" style="flex:1"></div>`;
  // nth
  h+=`<label>nth（取 filtered 第几个；负/越界取最后）<input type="number" value="${ext(b.nth,0)}" onchange="setBatch('nth',parseInt(this.value)||0)"></label>`;
  h+='<div style="font-size:10px;color:#8a9099">输入字段"源"可选：节点输出 / item(整个) / item.字段 / index。</div>';
  return h;
}
function setBatch(k,v){const n=findN(selNode);n.data.inputs.batch=n.data.inputs.batch||{};n.data.inputs.batch[k]=v;showProps();}
function setBatchSource(s){
  const n=findN(selNode);const b=n.data.inputs.batch;
  const[bid,name]=(s||'.').split('.');b.input={type:'list',value:{type:'ref',content:{source:'block-output',blockID:bid||'',name:name||''}}};showProps();
}
function setBatchCond(side,v){
  const n=findN(selNode);const c=n.data.inputs.batch.filter.conditions[0];
  if(side==='op')c.operator=v;
  if(side==='left'){c.left.input.value.content.name=v;c.left.input.value.content.blockID='__batch_output__';}
  if(side==='right')c.right.input.value.content=v;
}
function setInputSource(i,src){
  const n=findN(selNode);const p=nodeInputs(n)[i];if(!p)return;
  if(src==='item')p.input.value={type:'ref',content:{source:'loop-item',name:''}};
  else if(src==='index')p.input.value={type:'ref',content:{source:'loop-index'}};
  else if(src.startsWith('item.'))p.input.value={type:'ref',content:{source:'loop-item',name:src.slice(5)}};
  else p.input.value={type:'literal',content:''};  // node: 回到连线模式
  showProps();renderAll();
}

// 渲染输入/输出字段表（含 object 子字段 / list item 类型）
function renderIOFields(arr,kind){
  if(!arr.length)return '<div style="color:#8a9099;font-size:11px">（无）</div>';
  let h='<table class="io-table">';
  arr.forEach((f,i)=>{
    const t=f.input?.type||f.type||'string';
    h+=`<tr><td style="width:60px"><input value="${ext(f.name)}" onchange="setField('${kind}',${i},'name',this.value)"></td>
      <td style="width:70px"><select onchange="setField('${kind}',${i},'type',this.value)">${IO_TYPES.map(x=>`<option value="${x}" ${t===x?'selected':''}>${x}</option>`).join('')}</select></td>
      <td><button class="del" onclick="delField('${kind}',${i})">×</button></td></tr>`;
    h+=`<tr><td colspan="3"><input value="${ext(f.description)}" placeholder="描述" onchange="setField('${kind}',${i},'description',this.value)" style="font-size:10px;color:#8a9099"></td></tr>`;
    // 输入字段：若节点开启批处理，加"源"选择（节点输出/item/item.字段/index）
    if(kind==='in'){
      const n=findN(selNode);
      if(n&&n.data.inputs.batch?.enabled){
        const src=f.input?.value?.content?.source;
        let srcType='node';
        if(src==='loop-item')srcType=f.input?.value?.content?.name?('item.'+f.input.value.content.name):'item';
        else if(src==='loop-index')srcType='index';
        h+=`<tr><td colspan="3" style="font-size:10px">源: <select style="width:auto;font-size:10px" onchange="setInputSource(${i},this.value)">
          <option value="node" ${srcType==='node'?'selected':''}>节点输出(连线)</option>
          <option value="item" ${srcType==='item'?'selected':''}>item(整个)</option>
          <option value="index" ${srcType==='index'?'selected':''}>index</option></select>`;
        if(srcType.startsWith('item.')){
          h+=` <input value="${srcType.slice(5)}" placeholder="item字段" style="width:60px;font-size:10px" onchange="setInputSource(${i},'item.'+this.value)">`;
        }
        h+=`</td></tr>`;
      }
    }
    // list：选 item 类型
    if(t==='list'){
      const itemT=getListItemType(f);
      h+=`<tr><td colspan="3" class="sub-fields"><span style="font-size:10px;color:#8a9099">list item 类型: </span><select style="width:auto;font-size:10px" onchange="setListItemType('${kind}',${i},this.value)">${IO_TYPES.map(x=>`<option value="${x}" ${itemT===x?'selected':''}>${x}</option>`).join('')}</select></td></tr>`;
      if(itemT==='object') h+=renderObjectSubFields(f,kind,i,'list-item');
    }
    // object：子字段
    if(t==='object') h+=renderObjectSubFields(f,kind,i,'object');
  });
  h+='</table>';
  return h;
}
function renderObjectSubFields(f,kind,fi,ctx){
  let schema;
  if(ctx==='list-item'){schema=f.input?.schema||f.schema; if(Array.isArray(schema)){} else {schema=[];}}
  else {schema=f.schema||f.input?.schema||[];}
  if(!Array.isArray(schema))schema=[];
  let h=`<tr><td colspan="3" class="sub-fields"><div style="font-size:10px;color:#8a9099">子字段:</div>`;
  schema.forEach((s,si)=>{
    const st=s.type||'string';
    h+=`<div style="display:flex;gap:2px;margin:1px 0">
      <input value="${ext(s.name)}" placeholder="名" style="width:50px;font-size:10px" onchange="setSubField('${kind}',${fi},${si},'name',this.value,${ctx==='list-item'})">
      <select style="width:55px;font-size:10px" onchange="setSubField('${kind}',${fi},${si},'type',this.value,${ctx==='list-item'})">${IO_TYPES.map(x=>`<option value="${x}" ${st===x?'selected':''}>${x}</option>`).join('')}</select>
      <button class="del" onclick="delSubField('${kind}',${fi},${si},${ctx==='list-item'})">×</button></div>`;
    h+=`<input value="${ext(s.description)}" placeholder="描述" style="width:100%;font-size:10px;color:#8a9099;margin-bottom:1px" onchange="setSubField('${kind}',${fi},${si},'description',this.value,${ctx==='list-item'})">`;
    h+=`<label style="font-size:9px;color:#8a9099"><input type="checkbox" ${s.required?'checked':''} onchange="setSubField('${kind}',${fi},${si},'required',this.checked,${ctx==='list-item'})"> required</label>`;
  });
  h+=`<button onclick="addSubField('${kind}',${fi},${ctx==='list-item'})" style="font-size:10px">+ 子字段</button></td></tr>`;
  return h;
}
function getListItemType(f){
  const sch=f.input?.schema||f.schema;
  if(Array.isArray(sch))return 'object';
  if(sch&&sch.type)return sch.type;
  return 'string';
}

// ============ 字段编辑 ============
function findArr(kind){const n=findN(selNode);return kind==='in'?nodeInputs(n):nodeOutputs(n);}
function setProp(k,v){const n=findN(selNode);n[k]=v;renderAll();}
function setTitle(v){const n=findN(selNode);n.data.nodeMeta=n.data.nodeMeta||{};n.data.nodeMeta.title=v;renderAll();}
function addIO(kind){const n=findN(selNode);const item={name:'field'+Date.now()%1000,description:''};
  if(kind==='in'){n.data.inputs=n.data.inputs||{};n.data.inputs.inputParameters=n.data.inputs.inputParameters||[];item.input={type:'string',value:{type:'literal',content:''}};n.data.inputs.inputParameters.push(item);}
  else{n.data.outputs=n.data.outputs||[];item.type='string';n.data.outputs.push(item);}
  showProps();renderAll();}
function delField(kind,i){findArr(kind).splice(i,1);showProps();renderAll();}
function setField(kind,i,field,v){
  const arr=findArr(kind);const f=arr[i];
  if(field==='name')f.name=v;
  if(field==='description')f.description=v;
  if(field==='type'){if(kind==='in'){f.input.type=v;if(v!=='list'&&v!=='object')delete f.input.schema;}else{f.type=v;if(v!=='list'&&v!=='object')delete f.schema;}}
  showProps();renderAll();}
function setLLM(name,v){const n=findN(selNode);let lp=n.data.inputs.llmParam||(n.data.inputs.llmParam=[]);let p=lp.find(x=>x.name===name);if(!p){p={name,input:{type:'string',value:{type:'literal',content:''}}};lp.push(p);}p.input.value.content=v;}
function setLoop(field,v){const n=findN(selNode);if(field==='loopType')n.data.inputs.loopType=v;if(field==='loopCount')n.data.inputs.loopCount={type:'integer',value:{type:'literal',content:v}};}

// object 子字段 / list item
function getSchemaHolder(kind,fi,isListItem){
  const f=findArr(kind)[fi];
  if(isListItem){return {get:()=>{let s=f.input?.schema||f.schema;if(!Array.isArray(s))s=[];return s;},set:(arr)=>{f.input=f.input||{};f.input.schema=arr;}};}
  return {get:()=>{let s=f.schema||(f.input?.schema)||[];if(!Array.isArray(s))s=[];return s;},set:(arr)=>{f.schema=arr;}};
}
function addSubField(kind,fi,isListItem){const h=getSchemaHolder(kind,fi,isListItem);let a=h.get();a.push({name:'sub'+a.length,type:'string',description:'',required:false});h.set(a);showProps();}
function delSubField(kind,fi,si,isListItem){const h=getSchemaHolder(kind,fi,isListItem);let a=h.get();a.splice(si,1);h.set(a);showProps();}
function setSubField(kind,fi,si,field,v,isListItem){const h=getSchemaHolder(kind,fi,isListItem);let a=h.get();a[si][field]=v;h.set(a);if(field==='type')showProps();}
function setListItemType(kind,fi,itemType){
  const f=findArr(kind)[fi];
  if(itemType==='object'){const a=[];(f.input||f).schema=a;if(f.input)f.input.schema=a;}
  else{const sch={type:itemType};if(f.input)f.input.schema=sch;else f.schema=sch;}
  showProps();}
function addBranchCanvas(){const n=findN(selNode);n.data.inputs.branches.push({condition:{logic:2,conditions:[]}});renderAll();}

// ============ 文件操作 ============
async function api(method,path,body){
  try{const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);
    const r=await fetch(path,opts);return await r.json();}catch(e){return{error:e+''};}
}
async function loadFileList(){
  const r=await api('GET','/api/wf/list');const sel=document.getElementById('fileSel');
  sel.innerHTML='<option value="">选择工作流…</option>';
  (r.items||[]).forEach(it=>{const o=document.createElement('option');o.value=it.name;o.textContent=it.name+(it.description?` — ${it.description.slice(0,30)}`:'');sel.appendChild(o);});
}
async function openWf(name){
  const r=await api('GET','/api/wf/'+name);if(r.error){toast(r.error);return;}
  WF.name=r.name;WF.meta=r.meta||{};
  WF.nodes=(r.canvas.nodes||[]).map((n,i)=>{n.data.nodeMeta=n.data.nodeMeta||{title:TYPE_LABEL[n.type]};if(n.x==null)n.x=120+i*30;if(n.y==null)n.y=100+i*30;n.w=n.w||210;n.h=80;return n;});
  WF.edges=r.canvas.edges||[];
  document.getElementById('fileSel').value=name;
  document.getElementById('fdesc').value=WF.meta.description||'';
  document.getElementById('fcoze').value=WF.meta.coze_url||'';
  document.getElementById('fstatus').textContent='';
  selNode=null;showProps();renderAll();toast('已打开 '+name);
}
async function saveWf(){
  let name=WF.name;if(!name){const n=prompt('工作流名称：');if(!n)return;name=n;}
  document.getElementById('fstatus').textContent='保存中…';
  WF.meta.description=document.getElementById('fdesc').value;
  WF.meta.coze_url=document.getElementById('fcoze').value;
  // 保存时剥离 x/y/w/h（这些是编辑器视图状态）
  const canvas={nodes:WF.nodes.map(n=>{const c={id:n.id,type:n.type,data:JSON.parse(JSON.stringify(n.data))};return c;}),edges:WF.edges,versions:{}};
  const r=await api('PUT','/api/wf/'+name,{canvas,meta:WF.meta});
  if(r.error){toast(r.error);document.getElementById('fstatus').textContent='❌';return;}
  WF.name=r.name||name;document.getElementById('fileSel').value=WF.name;
  document.getElementById('fstatus').textContent='✅ 已保存';
  setTimeout(()=>document.getElementById('fstatus').textContent='',3000);
  await loadFileList();
}
async function createWf(){
  const n=prompt('新工作流名称（英文）：');if(!n)return;
  const r=await api('POST','/api/wf/create',{name:n});if(r.error){toast(r.error);return;}
  await loadFileList();openWf(r.name);
}
async function deleteWf(){
  const name=WF.name||document.getElementById('fileSel').value;if(!name){toast('请先选择工作流');return;}
  if(!confirm(`确定删除 "${name}"？`))return;
  const r=await api('DELETE','/api/wf/'+name);if(r.error){toast(r.error);return;}
  WF={name:'',nodes:[],edges:[],meta:{name:'',description:'',enabled:true,coze_url:''}};
  selNode=null;showProps();renderAll();document.getElementById('fileSel').value='';
  document.getElementById('fdesc').value='';document.getElementById('fcoze').value='';await loadFileList();toast('已删除 '+name);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,2000);}

// ============ 图例 ============
function renderLegend(){
  const d=document.getElementById('legend');
  d.innerHTML='<div style="margin-bottom:3px"><span class="swatch" style="background:#fff"></span>流程线（白实线）</div>'+
    Object.entries(TYPE_COLOR).map(([t,c])=>`<div><span class="swatch" style="background:${c}"></span>${t}</div>`).join('')+
    '<div style="margin-top:3px;font-size:9px">变量线=彩色虚线<br>同色端口才可互连<br>空白拖动=平移画布</div>';
}

// ============ Agent 工具节点 ============
let AGENT_TOOLS=[];
async function loadTools(){
  const r=await api('GET','/api/tools');
  AGENT_TOOLS=r.tools||[];
  renderToolPalette('');
}
function renderToolPalette(filter){
  const d=document.getElementById('toolPalette');
  const f=filter.toLowerCase();
  const list=AGENT_TOOLS.filter(t=>!f||t.name.toLowerCase().includes(f)||(t.description||'').toLowerCase().includes(f));
  if(!list.length){d.innerHTML='<span style="color:#8a9099">无匹配</span>';return;}
  d.innerHTML=list.map(t=>`<button class="pal-item ext" onclick="addToolNode('${t.name}')" title="${ext(t.description).slice(0,60)}">🔧 ${t.name}</button>`).join('');
}
function addToolNode(toolName){
  const t=AGENT_TOOLS.find(x=>x.name===toolName);if(!t)return;
  const inputParameters=t.params.map(p=>({name:p.name,input:{type:_mapToolType(p.type),value:{type:'literal',content:''}}}));
  const n={id:genId(),type:'4',x:150+WF.nodes.length*25,y:120+WF.nodes.length*25,w:230,h:80,
    data:{nodeMeta:{title:toolName},toolName,
      inputs:{inputParameters},
      outputs:[{name:'raw',type:'string',description:'工具原始返回'}]}};
  WF.nodes.push(n);selNode=n.id;showProps();renderAll();
}
function _mapToolType(t){return {string:'string',integer:'integer',int:'integer',number:'number',float:'float',boolean:'boolean',bool:'boolean',array:'list',object:'object'}[t]||'string';}
document.getElementById('toolFilter').oninput=function(){renderToolPalette(this.value);};

document.getElementById('fileSel').onchange=function(){if(this.value)openWf(this.value);};
document.addEventListener('keydown',(e)=>{
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();saveWf();}
  if((e.key==='Delete'||e.key==='Backspace')&&selNode&&!['100001','900001'].includes(selNode)&&e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA'){
    WF.nodes=WF.nodes.filter(n=>n.id!==selNode);WF.edges=WF.edges.filter(ed=>ed.sourceNodeID!==selNode&&ed.targetNodeID!==selNode);
    WF.nodes.forEach(n=>nodeInputs(n).forEach(p=>{if(inputRefSource(p)?.blockID===selNode)p.input.value={type:'literal',content:''};}));
    selNode=null;showProps();renderAll();
  }
});
window.WE={openWf,saveWf,createWf,deleteWf,renderAll,loadFileList};
renderLegend();loadFileList();loadTools();renderAll();
</script>
</body></html>
