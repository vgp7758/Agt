    // 无子字段：保留已有输入；若无则默认 result 字段捕获本轮输出
    contParams=Object.keys(existing).length?Object.values(existing)
      :[{name:'result',input:{type:nth.type||'string',value:{type:'ref',content:{source:'block-output',blockID:'',name:''}}}}];
  }
  contNode.data.inputs.inputParameters=contParams;
}
// 复合节点双击：进入子画布
function openComposite(nodeId){
  const n=findN(nodeId);if(!n)return;
  const label=TYPE_LABEL[n.type];
  _compositeStack.push({parentId:_currentParent, name:WF.name||'', nodes:WF.nodes, edges:WF.edges});
  _currentParent=nodeId;
  n.blocks=n.blocks||[]; n.edges=n.edges||[];
  const ENTRY_ID='__entry__', CONT_ID='__continue__', BREAK_ID='__break__';
  // 按类型找已有标记节点（兼容任意 ID 的加载数据），规范化 ID 并同步引用
  let entryNode=n.blocks.find(b=>String(b.type)==='1');
  let contNode=n.blocks.find(b=>String(b.type)==='29');
  let breakNode=n.blocks.find(b=>String(b.type)==='19');
  if(entryNode)_normMarkerId(n.blocks,n.edges,entryNode,ENTRY_ID);
  if(contNode)_normMarkerId(n.blocks,n.edges,contNode,CONT_ID);
  if(breakNode)_normMarkerId(n.blocks,n.edges,breakNode,BREAK_ID);
  // 创建缺失的标记
  if(!entryNode){
    entryNode={id:ENTRY_ID,type:'1',x:60,y:80,w:200,data:{nodeMeta:{title:'迭代入口'},outputs:[],trigger_parameters:[]}};
    n.blocks.unshift(entryNode);
  }
  if(!breakNode){
    breakNode={id:BREAK_ID,type:'19',x:700,y:80,w:120,data:{nodeMeta:{title:'中断(Break)'}}};
    n.blocks.push(breakNode);
  }
  if(!contNode){
    contNode={id:CONT_ID,type:'29',x:700,y:200,w:140,data:{nodeMeta:{title:'继续(本轮输出)'},inputs:{inputParameters:[]}}};
    n.blocks.push(contNode);
  }
  // 同步入口输出 / continue 输入
  _syncEntryOutputs(n,entryNode);
  _syncContinueInputs(n,contNode);
  // 基础连线（仅在完全没有边时补一条 入口→第一个body 或 入口→continue）
  const userBlocks=n.blocks.filter(b=>![ENTRY_ID,CONT_ID,BREAK_ID].includes(b.id));
  if(!n.edges.length){
    if(userBlocks.length)n.edges=[{sourceNodeID:ENTRY_ID,targetNodeID:userBlocks[0].id,sourcePortID:''}];
    else n.edges=[{sourceNodeID:ENTRY_ID,targetNodeID:CONT_ID,sourcePortID:''}];
  }
  // 给 blocks 里每个节点补默认宽高（位置由 autoLayout 重排）
  n.blocks.forEach((b,i)=>{if(!b.x)b.x=120+i*30;if(!b.y)b.y=80+i*30;b.w=b.w||200;});
  WF.nodes=n.blocks; WF.edges=n.edges;
  selNode=null; selEdge=null;
  document.getElementById('breadcrumb').textContent='▸ '+label+' ('+nodeId+')';
  document.getElementById('breadcrumb').style.display='';
  document.getElementById('btnExitComp').style.display='';
  autoLayout(true);
  toast('已进入 '+label+' 子画布——迭代入口(item/index/变量)→节点→继续(本轮输出) 或 中断');
}
function exitComposite(){
  if(!_currentParent||!_compositeStack.length)return;
  // 把当前编辑写回复合节点（保留迭代入口/continue/break 标记节点，执行器需要它们）
  const n=findN(_currentParent);
  if(n){
    n.blocks=WF.nodes.map(m=>({id:m.id,type:m.type,data:m.data}));
    n.edges=WF.edges.map(e=>({sourceNodeID:e.sourceNodeID,targetNodeID:e.targetNodeID,sourcePortID:e.sourcePortID||'',...(e.targetPortID?{targetPortID:e.targetPortID}:{})}));
    // 补充 composite→迭代入口 的入口边（若不存在）
    const port=(n.type==='21'?'loop':'batch')+'-function-inline-output';
    if(!n.edges.some(e=>String(e.sourceNodeID)===_currentParent&&String(e.sourcePortID||'').endsWith('-function-inline-output'))){
      n.edges.unshift({sourceNodeID:_currentParent,targetNodeID:'__entry__',sourcePortID:port});
    }
  }
  // 恢复上层画布
  const prev=_compositeStack.pop();
  _currentParent=prev.parentId;
  WF.nodes=prev.nodes; WF.edges=prev.edges;
  WF.name=prev.name||WF.name;
  if(_currentParent){
    const pn=findN(_currentParent);
    document.getElementById('breadcrumb').textContent='▸ '+(TYPE_LABEL[pn?.type]||'')+' ('+_currentParent+')';
  }else{
    document.getElementById('breadcrumb').style.display='none';
    document.getElementById('btnExitComp').style.display='none';
  }
  selNode=null; showProps(); renderAll();
}

// 代码节点画布预览
function makeCodePreview(n){
  const code=(n.data.inputs?.code||'').replace(/#[^\n]*/g,'').replace(/\n{2,}/g,'\n').trim();
  const lines=code.split('\n').slice(0,3);
  if(!lines.join('').trim())return null;
  const fo=document.createElementNS(NS,'foreignObject');
  const div=document.createElement('div');
  div.style.cssText='width:100%;height:100%;font-size:9px;font-family:monospace;color:#8a9099;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:2px 4px';
  div.textContent=lines.join(' · ');
  fo.appendChild(div);fo.style.pointerEvents='none';
  return fo;
}
function setLoop(field,v){const n=findN(selNode);if(field==='loopType')n.data.inputs.loopType=v;if(field==='loopCount')n.data.inputs.loopCount={type:'integer',value:{type:'literal',content:v}};}

// object 子字段 / list item（路径版，支持多层嵌套）
// 按路径定位 schema 数组的 holder；首段 f<idx>=object字段(写f.schema) / i<idx>=list的item(写f.input.schema)，后续 o/l<idx> 下钻子字段的 schema
function resolveSchemaHolder(kind,path){
  const segs=path.split('/');
  const f=findArr(kind)[parseInt(segs[0].slice(1))];
  if(!f)return{get:()=>[],set:()=>{}};
  let holder;
  if(segs[0][0]==='i'){
    holder={get:()=>{let s=f.input?.schema||f.schema;return Array.isArray(s)?s:[];},set:(arr)=>{f.input=f.input||{};f.input.schema=arr;}};
  }else{
    holder={get:()=>{let s=f.schema||(f.input?.schema)||[];return Array.isArray(s)?s:[];},set:(arr)=>{f.schema=arr;}};
  }
  for(let k=1;k<segs.length;k++){
    const sub=holder.get()[parseInt(segs[k].slice(1))];
    if(!sub)return{get:()=>[],set:()=>{}};
    holder={get:()=>Array.isArray(sub.schema)?sub.schema:[],set:(arr)=>{sub.schema=arr;}};
  }
  return holder;
}
function _afterSchemaEdit(rerender){if(['21','28'].includes(findN(selNode)?.type))_syncListSchema();showProps();if(rerender)renderAll();}
function addSubFieldP(kind,path){const h=resolveSchemaHolder(kind,path);const a=h.get();a.push({name:'sub'+a.length,type:'string',description:'',required:false});h.set(a);_afterSchemaEdit(true);}
function delSubFieldP(kind,path,si){const h=resolveSchemaHolder(kind,path);const a=h.get();a.splice(si,1);h.set(a);_afterSchemaEdit(true);}
function setSubFieldP(kind,path,si,field,v){
  const h=resolveSchemaHolder(kind,path);const a=h.get();const s=a[si];if(!s)return;
  if(field==='type'){
    s.type=v;
    if(v==='object'){if(!Array.isArray(s.schema))s.schema=[];}
    else if(v!=='list')delete s.schema;
    // v==='list' 时保留现有 schema（若是字段数组则 item 直接为 object），否则 getListItemType 兜底 'string'
  }else s[field]=v;
  _afterSchemaEdit(field==='type');
}
function setSubItemTypeP(kind,path,si,itemType){
  const h=resolveSchemaHolder(kind,path);const a=h.get();const s=a[si];if(!s)return;
  if(itemType==='object'){if(!Array.isArray(s.schema))s.schema=[];}
  else s.schema={type:itemType};
  _afterSchemaEdit(true);
}
function setListItemType(kind,fi,itemType){
  const f=findArr(kind)[fi];
  if(itemType==='object'){const a=[];(f.input||f).schema=a;if(f.input)f.input.schema=a;}
  else{const sch={type:itemType};if(f.input)f.input.schema=sch;else f.schema=sch;}
  showProps();}
function addBranchCanvas(){const n=findN(selNode);n.data.inputs.branches.push({condition:{logic:2,conditions:[]}});renderAll();}

// ============ 文件操作 ============
async function api(method,path,body){
  try{const opts={method,headers:{'Content-Type':'application/json'}};if(body)opts.body=JSON.stringify(body);
    const r=await fetch(path,opts);return await r.json();}catch(e){return{error:e+''};}
}
async function loadFileList(){
  const r=await api('GET','/api/wf/list');const sel=document.getElementById('fileSel');
  const cur=sel.value;   // 保留当前选中（保存后不丢失）
  WFLIST=r.items||[];
  sel.innerHTML='<option value="">选择工作流…</option>';
  WFLIST.forEach(it=>{const o=document.createElement('option');o.value=it.name;o.textContent=it.name+(it.description?` — ${it.description.slice(0,30)}`:'');sel.appendChild(o);});
  if(cur && Array.from(sel.options).some(o=>o.value===cur)) sel.value=cur;
}
async function openWf(name){
  const r=await api('GET','/api/wf/'+name);if(r.error){toast(r.error);return;}
  if(!AGENT_TOOLS.length) await loadTools();   // syncToolNode 依赖工具 schema，确保已加载
  _compositeStack=[]; _currentParent=null;
  document.getElementById('breadcrumb').style.display='none';
  document.getElementById('btnExitComp').style.display='none';
  WF.name=r.name;WF.meta=r.meta||{};
  WF.nodes=(r.canvas.nodes||[]).map((n,i)=>{n.data.nodeMeta=n.data.nodeMeta||{title:TYPE_LABEL[n.type]};if(n.x==null)n.x=120+i*30;if(n.y==null)n.y=100+i*30;n.w=n.w||210;n.h=80;return n;});
  WF.edges=r.canvas.edges||[];
  WF.nodes.forEach(syncToolNode);   // 插件节点按 toolName schema 补全空输入/输出字段
  // 子工作流节点按目标工作流 schema 同步输入/输出字段（保留已连的线）
  Promise.all(WF.nodes.filter(n=>n.type==='9'&&n.data.inputs?.workflowId).map(syncSubworkflowNode)).then(()=>{autoLayout(true);if(selNode)showProps();});
  document.getElementById('fileSel').value=name;
  document.getElementById('fdesc').value=WF.meta.description||'';
  document.getElementById('fcoze').value=WF.meta.coze_url||'';
  document.getElementById('fauto').checked=!!WF.meta.auto;
  document.getElementById('fautoparam').value=WF.meta.auto_param||'query';
  const _sf=document.getElementById('saveFormat'); if(_sf) _sf.value=r.format||'json';  // 同步当前文件格式
  document.getElementById('fstatus').textContent='';
  WF.nodes.forEach(_uncollapseNode);  // 打开时展开所有 object 字段（默认折叠看不到子字段）
  selNode=null;autoLayout(true);toast('已打开 '+name+(r.format==='xml'?' [XML]':''));
}
async function saveWf(){
  // 子画布中：先退出所有层级
  while(_currentParent)exitComposite();
  let name=WF.name;if(!name){const n=prompt('工作流名称：');if(!n)return;name=n;}
  document.getElementById('fstatus').textContent='保存中…';
  WF.meta.description=document.getElementById('fdesc').value;
  WF.meta.coze_url=document.getElementById('fcoze').value;
  WF.meta.auto=document.getElementById('fauto').checked;
  WF.meta.auto_param=document.getElementById('fautoparam').value||'query';
  // 保留 x/y（画布布局位置，自动布局/拖拽后重开能还原）；w/h 由渲染重算故不存
  const canvas={nodes:WF.nodes.map(n=>({id:n.id,type:n.type,x:n.x,y:n.y,data:JSON.parse(JSON.stringify(n.data))})),edges:WF.edges,versions:{}};
  const fmt=(document.getElementById('saveFormat')||{}).value||'json';
  const r=await api('PUT','/api/wf/'+name,{canvas,meta:WF.meta,format:fmt});
  if(r.error){toast(r.error);document.getElementById('fstatus').textContent='❌';return;}
  WF.name=r.name||name;document.getElementById('fileSel').value=WF.name;
  document.getElementById('fstatus').textContent='✅ 已保存 ('+(r.format||fmt).toUpperCase()+')';
  setTimeout(()=>document.getElementById('fstatus').textContent='',3000);
  await loadFileList();
}
async function createWf(){
  const n=prompt('新工作流名称（英文）：');if(!n)return;
  const r=await api('POST','/api/wf/create',{name:n});if(r.error){toast(r.error);return;}
  await loadFileList();openWf(r.name);
}
async function deleteWf(){
  const name=WF.name||document.getElementById('fileSel').value;if(!name){toast('请先选择工作流');return;}
  if(!confirm(`确定删除 "${name}"？`))return;
  const r=await api('DELETE','/api/wf/'+name);if(r.error){toast(r.error);return;}
  WF={name:'',nodes:[],edges:[],meta:{name:'',description:'',enabled:true,coze_url:''}};
  selNode=null;showProps();renderAll();document.getElementById('fileSel').value='';
  document.getElementById('fdesc').value='';document.getElementById('fcoze').value='';await loadFileList();toast('已删除 '+name);
}

function focusEntry(){
  const en=WF.nodes.find(function(n){return n.id==='100001';});
  if(!en){toast('无开始节点');return;}

// 自动布局：从开始节点沿流程线分层（层=最长前驱路径），同层纵向排，层间水平拉开；
// 连不到开始节点的孤立节点纵向罗列在最右侧。
function autoLayout(silent){
  if(!WF.nodes.length){if(!silent)toast('无节点');return;}
  const byId={}; WF.nodes.forEach(n=>byId[n.id]=n);
  const pred={}, succ={};
  WF.nodes.forEach(n=>{pred[n.id]=[];succ[n.id]=[];});
  WF.edges.forEach(e=>{
    if(byId[e.sourceNodeID]&&byId[e.targetNodeID]){
      succ[e.sourceNodeID].push(e.targetNodeID);
      pred[e.targetNodeID].push(e.sourceNodeID);
    }
  });
  const isComp=!!_currentParent;
  const ENTRY=isComp?'__entry__':'100001';
  const BREAK_ID='__break__', CONT_ID='__continue__';
  // 多轮松弛分层：layer = max(已分层前驱)+1。可达 entry 的节点最终都有层。
  // 子画布中 break/continue 跳过传播，最后统一放最右层。
  const layer={};
  if(byId[ENTRY]) layer[ENTRY]=0;
  for(let k=0;k<WF.nodes.length+2;k++){
    let changed=false;
    WF.nodes.forEach(n=>{
      if(n.id===ENTRY){ if(layer[n.id]!==0){layer[n.id]=0;changed=true;} return; }
      if(isComp&&(n.id===BREAK_ID||n.id===CONT_ID)) return;
      let mx=-1;
      pred[n.id].forEach(p=>{ if(layer[p]!=null && layer[p]>mx) mx=layer[p]; });
      if(mx>=0){ const nl=mx+1; if(layer[n.id]!==nl){layer[n.id]=nl;changed=true;} }
    });
    if(!changed) break;
  }
  const byLayer={};
  WF.nodes.forEach(n=>{ if(layer[n.id]!=null){ (byLayer[layer[n.id]]=byLayer[layer[n.id]]||[]).push(n);} });
  // 子画布：break/continue 放在最右层
  if(isComp){
    const maxL=Object.keys(byLayer).length?Math.max(...Object.keys(byLayer).map(Number)):0;
    const lastL=maxL+1;
    [BREAK_ID,CONT_ID].forEach(id=>{
      if(byId[id]&&layer[id]==null){
        layer[id]=lastL;
        (byLayer[lastL]=byLayer[lastL]||[]).push(byId[id]);
      }
    });
  }
  const orphan=WF.nodes.filter(n=>layer[n.id]==null);
  // 节点宽 ~210，高动态计算；层间水平 300，同层纵向按实际高度累加
  const X0=120, Y0=80, XSTEP=300, YGAP=40;
  const layers=Object.keys(byLayer).map(Number).sort((a,b)=>a-b);
  layers.forEach(L=>{
    let cy=Y0;
    byLayer[L].forEach(n=>{
      n.x=X0+L*XSTEP; n.y=cy;
      cy+=nodeH(n)+YGAP;
    });
  });
  if(orphan.length){
    const maxL=layers.length?layers[layers.length-1]:0;
    const ox=X0+(maxL+1)*XSTEP;
    let cy=Y0;
    orphan.forEach(n=>{
      n.x=ox; n.y=cy;
      cy+=nodeH(n)+YGAP;
    });
  }
  selNode=null;showProps();renderAll();
  if(!silent){
    const nl=layers.length, no=orphan.length;
    toast('已自动布局：'+nl+' 层'+(no?('，孤立 '+no+' 个'):''));
  }
}
renderLegend();loadFileList();loadTools();renderAll();
